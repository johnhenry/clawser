name: Deploy to erisera.com (Cloudflare Workers)

# Manual trigger only. This is a NEW deploy target alongside the existing
# GitHub Pages deploy (static.yml) — not a replacement yet. static.yml keeps
# auto-deploying web/ to the current live github.io demo on every push;
# this workflow deploys the same web/ (plus docs-site's Starlight build,
# copied into web/docs/) to clawser.erisera.com via Cloudflare Workers.
# Cutting over from github.io to erisera.com — and updating the README's
# "Live demo" link — is a separate decision once erisera.com is confirmed
# stable. Requires repo secrets CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID (Workers Scripts:Edit scope).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install docs-site dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build docs (copies into web/docs/)
        run: npm run build
        working-directory: docs-site

      - name: Install wrangler
        run: npm install -g wrangler@^4.107.0

      - name: Deploy web/ (app + docs)
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
