<!DOCTYPE html>
<html>
<head><title>OAuth Callback</title></head>
<body>
<p>Authenticating...</p>
<script>
  // Extract code and state from URL, send to opener, then close
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  if (window.opener) {
    window.opener.postMessage({ type: '__clawser_oauth_callback__', code, state, error }, '*');
  }
  document.body.textContent = code ? 'Authorized! You can close this window.' : (error || 'No code received.');
  setTimeout(() => window.close(), 1500);
</script>
</body>
</html>
