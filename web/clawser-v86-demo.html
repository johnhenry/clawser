<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clawser v86 Linux Guest — PoC Demo</title>
  <style>
    :root {
      --bg: #1a1a1c;
      --card: #27272a;
      --code: #232334;
      --text: #e9e9ea;
      --text-secondary: #a1a1a8;
      --accent: #8c7ae6;
      --accent-hover: #a192ea;
      --action: #e67e22;
      --action-hover: #f39c12;
      --danger: #e25f73;
      --border: #393941;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
    }

    h1 { font-size: 20px; margin-bottom: 8px; }
    h2 { font-size: 16px; color: var(--text-secondary); margin-bottom: 16px; font-weight: normal; }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-action {
      background: var(--action);
      border-color: var(--action);
      color: #fff;
    }
    .btn-action:hover { background: var(--action-hover); border-color: var(--action-hover); color: #fff; }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    .btn-secondary {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-secondary:hover { background: var(--accent); color: #fff; }

    #terminal {
      background: var(--code);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 400px;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .metrics {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .metric-label {
      font-size: 12px;
      font-style: italic;
      color: var(--text-secondary);
    }

    .metric-value {
      font-family: 'SF Mono', monospace;
      font-size: 16px;
      color: var(--accent);
    }

    #status {
      font-size: 12px;
      font-style: italic;
      color: var(--text-secondary);
      margin-left: 8px;
    }

    .cmd-input {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .cmd-input input {
      flex: 1;
      padding: 8px 12px;
      font-size: 14px;
      font-family: 'SF Mono', monospace;
      background: var(--code);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
    }
    .cmd-input input:focus { border-color: var(--accent); }

    .screen-container {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>clawser v86 Linux Guest</h1>
  <h2>Proof-of-concept: real Linux kernel running in the browser via x86 emulation</h2>

  <div class="controls">
    <button id="btnBoot" class="btn-action" onclick="doBoot()">Boot Alpine Linux</button>
    <button id="btnUname" class="btn-secondary" onclick="doUname()" disabled>Run uname -a</button>
    <button id="btnShutdown" class="btn-danger" onclick="doShutdown()" disabled>Shutdown</button>
    <span id="status">idle</span>
  </div>

  <div id="terminal"></div>

  <div class="cmd-input">
    <input id="cmdInput" type="text" placeholder="Type a command and press Enter..." disabled
           onkeydown="if(event.key==='Enter') doSendCmd()">
    <button id="btnSend" class="btn-secondary" onclick="doSendCmd()" disabled>Send</button>
  </div>

  <div class="metrics" id="metricsPanel" style="display:none;">
    <strong>Performance Metrics</strong>
    <div class="metrics-grid">
      <div class="metric">
        <span class="metric-label">Boot time</span>
        <span class="metric-value" id="metricBoot">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Heap before</span>
        <span class="metric-value" id="metricMemBefore">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Heap after</span>
        <span class="metric-value" id="metricMemAfter">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Heap delta</span>
        <span class="metric-value" id="metricMemDelta">—</span>
      </div>
    </div>
  </div>

  <!-- Hidden VGA screen container required by v86 -->
  <div id="screen_container" class="screen-container">
    <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
    <canvas></canvas>
  </div>

  <script type="module">
    import { LinuxGuest } from './clawser-v86-guest.mjs';

    let guest = null;
    const term = document.getElementById('terminal');
    const status = document.getElementById('status');

    const log = (text) => {
      term.textContent += text;
      term.scrollTop = term.scrollHeight;
    };

    const setStatus = (s) => { status.textContent = s; };

    const setButtons = (boot, uname, shutdown, cmd) => {
      document.getElementById('btnBoot').disabled = !boot;
      document.getElementById('btnUname').disabled = !uname;
      document.getElementById('btnShutdown').disabled = !shutdown;
      document.getElementById('cmdInput').disabled = !cmd;
      document.getElementById('btnSend').disabled = !cmd;
    };

    window.doBoot = async () => {
      term.textContent = '';
      setButtons(false, false, false, false);
      setStatus('loading v86 from CDN...');

      guest = new LinuxGuest({
        memoryMb: 64,
        headless: false,
        screenContainer: document.getElementById('screen_container'),
      });

      guest.onOutput((text) => log(text));
      guest.onStateChange((state) => setStatus(state));

      try {
        const stats = await guest.boot({ timeoutMs: 90_000 });
        setButtons(false, true, true, true);
        setStatus('running');

        // Show metrics
        const m = guest.metrics();
        document.getElementById('metricsPanel').style.display = 'block';
        document.getElementById('metricBoot').textContent = `${m.bootMs}ms`;
        document.getElementById('metricMemBefore').textContent = m.memoryBefore ? `${m.memoryBefore.usedMb}MB` : 'N/A';
        document.getElementById('metricMemAfter').textContent = m.memoryAfter ? `${m.memoryAfter.usedMb}MB` : 'N/A';
        document.getElementById('metricMemDelta').textContent = m.memoryDeltaMb != null ? `+${m.memoryDeltaMb}MB` : 'N/A';

        log('\n--- BOOT COMPLETE ---\n');
        log(`Boot time: ${stats.bootMs}ms\n`);
        if (stats.memory) log(`Heap usage: ${stats.memory.usedMb}MB\n`);
        log('---\n\n');
      } catch (err) {
        log(`\n\n[ERROR] Boot failed: ${err.message}\n`);
        setStatus('error');
        setButtons(true, false, false, false);
      }
    };

    window.doUname = async () => {
      setButtons(false, false, false, false);
      setStatus('running command...');
      try {
        const output = await guest.sendCommand('uname -a');
        setStatus('running');
      } catch (err) {
        log(`\n[ERROR] ${err.message}\n`);
      }
      setButtons(false, true, true, true);
    };

    window.doSendCmd = async () => {
      const input = document.getElementById('cmdInput');
      const cmd = input.value.trim();
      if (!cmd) return;
      input.value = '';
      setButtons(false, false, false, false);
      setStatus('running command...');
      try {
        await guest.sendCommand(cmd);
      } catch (err) {
        log(`\n[ERROR] ${err.message}\n`);
      }
      setStatus('running');
      setButtons(false, true, true, true);
      input.focus();
    };

    window.doShutdown = async () => {
      setButtons(false, false, false, false);
      setStatus('shutting down...');
      try {
        await guest.shutdown();
        log('\n--- GUEST SHUTDOWN ---\n');
        setStatus('shutdown');
      } catch (err) {
        log(`\n[ERROR] Shutdown: ${err.message}\n`);
        setStatus('error');
      }
      setButtons(true, false, false, false);
    };
  </script>
</body>
</html>
