<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Clawser Remote</title>
  <link rel="stylesheet" href="remote-ui.css">
</head>
<body>
  <!-- Pairing Screen -->
  <div id="pairingScreen" class="screen active">
    <div class="pairing-container">
      <h1 class="pairing-title">Clawser Remote</h1>
      <p class="pairing-subtitle">Enter the 6-digit pairing code from your desktop</p>

      <div class="code-input-group">
        <input
          id="codeInput"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="000000"
          autocomplete="off"
          class="code-input"
        >
      </div>

      <button id="pairBtn" class="btn btn-primary" disabled>Connect</button>

      <div id="pairError" class="error-message" hidden></div>

      <div class="pairing-footer">
        <p>Generate a code from the Clawser desktop app<br>using the <code>remote_pair</code> command</p>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="screen">
    <header class="chat-header">
      <div class="header-left">
        <span class="status-dot" id="statusDot"></span>
        <span class="header-title">Clawser</span>
      </div>
      <button id="disconnectBtn" class="btn btn-small btn-danger">Disconnect</button>
    </header>

    <div id="chatMessages" class="chat-messages">
      <div class="welcome-message">
        <p>Connected to Clawser agent. Send a message to get started.</p>
      </div>
    </div>

    <form id="chatForm" class="chat-input-area">
      <textarea
        id="messageInput"
        class="message-input"
        placeholder="Type a message..."
        rows="1"
        autocomplete="off"
      ></textarea>
      <button type="submit" class="btn btn-send" id="sendBtn">
        <span class="send-icon">&#9654;</span>
      </button>
    </form>
  </div>

  <script type="module">
    import { RemoteUI } from './remote-ui.js';

    // ── DOM refs ──────────────────────────────────────────────

    const pairingScreen = document.getElementById('pairingScreen');
    const chatScreen = document.getElementById('chatScreen');
    const codeInput = document.getElementById('codeInput');
    const pairBtn = document.getElementById('pairBtn');
    const pairError = document.getElementById('pairError');
    const chatMessages = document.getElementById('chatMessages');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusDot = document.getElementById('statusDot');

    // ── Determine gateway URL ─────────────────────────────────

    const params = new URLSearchParams(location.search);
    const gatewayUrl = params.get('gateway') || location.origin;

    const ui = new RemoteUI({ baseUrl: gatewayUrl });

    // ── Pairing ───────────────────────────────────────────────

    codeInput.addEventListener('input', () => {
      const val = codeInput.value.replace(/\D/g, '').slice(0, 6);
      codeInput.value = val;
      pairBtn.disabled = val.length < 6;
    });

    pairBtn.addEventListener('click', async () => {
      pairBtn.disabled = true;
      pairBtn.textContent = 'Connecting...';
      pairError.hidden = true;

      try {
        await ui.pair(codeInput.value.trim());
        showChat();
      } catch (err) {
        pairError.textContent = err.message || 'Pairing failed';
        pairError.hidden = false;
        pairBtn.textContent = 'Connect';
        pairBtn.disabled = codeInput.value.length < 6;
      }
    });

    // ── Chat ──────────────────────────────────────────────────

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      appendMessage('user', text);
      messageInput.value = '';
      autoResize(messageInput);
      sendBtn.disabled = true;

      try {
        const result = await ui.sendMessage(text);
        // Message already added to state by RemoteUI
      } catch (err) {
        appendMessage('system', `Error: ${err.message}`);
      }

      sendBtn.disabled = false;
      messageInput.focus();
    });

    messageInput.addEventListener('input', () => autoResize(messageInput));
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.dispatchEvent(new Event('submit'));
      }
    });

    disconnectBtn.addEventListener('click', () => {
      ui.disconnect();
      showPairing();
    });

    // ── UI state listener ─────────────────────────────────────

    ui.state.onChange((evt) => {
      if (evt.type === 'message') {
        if (evt.message.role === 'assistant') {
          appendMessage('assistant', evt.message.content);
        }
      }
      if (evt.type === 'connection') {
        statusDot.classList.toggle('connected', evt.connected);
      }
    });

    // ── Helpers ───────────────────────────────────────────────

    function showChat() {
      pairingScreen.classList.remove('active');
      chatScreen.classList.add('active');
      statusDot.classList.add('connected');
      messageInput.focus();
    }

    function showPairing() {
      chatScreen.classList.remove('active');
      pairingScreen.classList.add('active');
      statusDot.classList.remove('connected');
      codeInput.value = '';
      pairBtn.disabled = true;
      pairBtn.textContent = 'Connect';
      chatMessages.innerHTML = '<div class="welcome-message"><p>Connected to Clawser agent. Send a message to get started.</p></div>';
    }

    function appendMessage(role, content) {
      // Remove welcome message if present
      const welcome = chatMessages.querySelector('.welcome-message');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message message-${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;

      div.appendChild(bubble);
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }
  </script>
</body>
</html>
