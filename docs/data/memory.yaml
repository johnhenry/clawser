# Clawser Memory — BM25, vector search, embedding backends, categories, dedup, purging, hybrid recall
# Source of truth for the semantic memory subsystem

- name: SemanticMemory
  status: implemented
  description: >
    Hybrid search memory system combining BM25 keyword matching (synchronous) and
    cosine similarity vector search (async embeddings). Stores memories with categories,
    automatic deduplication, and cleanup hygiene. Approximately 903 LOC.
    Supports import/export, serialization, and embedding backfill.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - SemanticMemory
    - SemanticMemory.store
    - SemanticMemory.get
    - SemanticMemory.update
    - SemanticMemory.delete
    - SemanticMemory.all
    - SemanticMemory.clear
    - SemanticMemory.recall
    - SemanticMemory.embedEntry
    - SemanticMemory.backfillEmbeddings
    - SemanticMemory.hygiene
    - SemanticMemory.importFromFlatArray
    - SemanticMemory.exportToFlatArray
    - SemanticMemory.toJSON
    - SemanticMemory.fromJSON
    - SemanticMemory.clearEmbeddingCache
  category: memory-engine
  notes: >
    recall() performs BM25 first (sync), then optionally vector search (async) if
    an embedding provider is configured. Results are merged and deduplicated.
  since: "1.0.0"
  see_also:
    - BM25 Search
    - Vector Search
    - Embedding Providers

- name: BM25 Search
  status: implemented
  description: >
    Synchronous BM25 keyword search for fast initial memory retrieval. Tokenizes
    queries and documents, computes term frequency and inverse document frequency
    scores. Used as the primary recall mechanism when no embedding provider is configured.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - bm25Score
    - tokenize
  category: search
  since: "1.0.0"

- name: Vector Search
  status: implemented
  description: >
    Cosine similarity vector search using pre-computed embeddings. Compares query
    embedding against stored memory embeddings for semantic matching. Requires an
    active embedding provider.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - cosineSimilarity
  category: search
  since: "1.0.0"

- name: Embedding Provider Base
  status: implemented
  description: >
    Abstract base class for embedding providers. Defines the interface with name,
    dimensions, and embed() method returning Float32Array vectors.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - EmbeddingProvider
    - EmbeddingProvider.name
    - EmbeddingProvider.dimensions
    - EmbeddingProvider.embed
  category: embeddings
  since: "1.0.0"

- name: NoopEmbedder
  status: implemented
  description: >
    No-operation embedder that always returns null. Used as the default when no
    embedding provider is configured. BM25 search still works without embeddings.
  files:
    - web/clawser-memory.js
  api:
    - NoopEmbedder
  category: embeddings
  since: "1.0.0"

- name: OpenAI Embedding Provider
  status: implemented
  description: >
    Embedding provider using OpenAI's text-embedding-ada-002 or text-embedding-3-small
    API. Requires an OpenAI API key. Returns 1536-dimensional vectors.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - OpenAIEmbeddingProvider
  category: embeddings
  notes: Default model is text-embedding-ada-002 (1536 dimensions).
  since: "1.0.0"

- name: Chrome AI Embedding Provider
  status: implemented
  description: >
    On-device embedding provider using Chrome's built-in AI embedding API.
    Runs entirely locally with no API key required. Requires Chrome 127+ with AI features.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - ChromeAIEmbeddingProvider
    - ChromeAIEmbeddingProvider.isAvailable
  category: embeddings
  notes: Requires Chrome with AI features enabled. Fully local inference.
  since: "1.5.0"

- name: Transformers.js Embedding Provider
  status: implemented
  description: >
    Client-side embedding provider using Hugging Face Transformers.js. Runs models
    directly in the browser via WASM/WebGPU. No API key required.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - TransformersEmbeddingProvider
    - TransformersEmbeddingProvider.isAvailable
  category: embeddings
  notes: Uses ONNX models loaded via CDN. Runs in browser via WASM.
  since: "1.5.0"

- name: Memory Categories
  status: implemented
  description: >
    Four memory categories for organizing stored knowledge: core (system-critical),
    learned (discovered facts), user (user-stated preferences), and context (session-specific).
    Categories can be used as filters during recall.
  files:
    - web/types.d.ts
    - web/clawser-memory.d.ts
  api:
    - MemoryCategory
  category: categories
  notes: "Categories: core, learned, user, context."
  since: "1.0.0"

- name: Memory Deduplication
  status: implemented
  description: >
    Automatic deduplication during store operations. Detects near-duplicate entries
    by key and content similarity and merges or replaces them.
  files:
    - web/clawser-memory.js
  api:
    - SemanticMemory.store
  category: dedup
  since: "1.0.0"

- name: Memory Hygiene
  status: implemented
  description: >
    Cleanup operations for memory maintenance. Removes expired entries based on max age,
    enforces maximum entry count, and purges orphaned embeddings. Can be triggered
    manually or automatically.
  files:
    - web/clawser-memory.js
    - web/clawser-memory.d.ts
  api:
    - SemanticMemory.hygiene
    - memoryHygiene
  category: maintenance
  notes: "Options: maxAge (ms), maxEntries (count)."
  since: "1.0.0"

- name: Memory Persistence
  status: implemented
  description: >
    Memory state is serialized to JSON and persisted to OPFS per-workspace.
    Includes all entries with their embeddings. Restored on workspace load.
  files:
    - web/clawser-agent.js
  api:
    - persistMemories
    - restoreMemories
  category: persistence
  since: "1.0.0"
  see_also:
    - Workspace Management

- name: Auto-Learning
  status: partial
  description: >
    The agent can be configured to automatically store learned facts and user preferences
    during conversation. Currently requires explicit tool calls; fully automatic extraction
    is planned.
  files:
    - web/clawser-memory.js
  api:
    - memoryStore
  category: auto-learning
  notes: Enable via autonomy settings in the Config panel.
  since: "1.0.0"
