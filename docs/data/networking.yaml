# Clawser Networking — WSH remote tools, remote access, OAuth, auth profiles, MCP client
# Source of truth for the networking subsystem

- name: WSH Remote Shell
  status: implemented
  description: >
    Web Shell Hosting protocol for remote server access. Provides SSH-like functionality
    over WebSocket with command execution, PTY sessions, file transfer, and MCP bridging.
    11 agent tools for comprehensive remote management.
  files:
    - web/clawser-wsh-tools.js
    - web/clawser-wsh-tools.d.ts
    - web/clawser-wsh-cli.js
    - web/clawser-wsh-cli.d.ts
  api:
    - WshConnectTool
    - WshExecTool
    - WshPtyOpenTool
    - WshPtyWriteTool
    - WshUploadTool
    - WshDownloadTool
    - WshDisconnectTool
    - WshSessionsTool
    - WshMcpCallTool
    - WshFetchTool
    - registerWshTools
    - getWshConnections
  category: wsh
  notes: >
    11 tools: wsh_connect, wsh_exec, wsh_pty_open, wsh_pty_write, wsh_upload,
    wsh_download, wsh_disconnect, wsh_sessions, wsh_mcp_call, wsh_fetch, plus
    wsh_compress and wsh_file_op.
  since: "1.5.0"
  see_also:
    - WSH Incoming
    - Virtual Terminal Manager

- name: WSH Incoming
  status: implemented
  description: >
    Inbound WSH connection handling. Manages reverse-connect sessions where remote
    peers initiate connections to this Clawser instance. Supports participant key tracking,
    capability negotiation, tool call forwarding, and MCP call relaying.
  files:
    - web/clawser-wsh-incoming.js
    - web/clawser-wsh-incoming.d.ts
  api:
    - handleReverseConnect
    - listIncomingSessions
    - getIncomingSession
    - setKernelBridge
    - setToolRegistry
    - setMcpClient
    - setAgentGateway
    - setVirtualTerminalManager
  category: wsh
  since: "1.5.0"

- name: Virtual Terminal Manager
  status: implemented
  description: >
    PTY session management for remote WSH connections. Manages peer contexts,
    channels, and terminal I/O for each connected remote participant. Supports
    open, reattach, write, resize, signal, and close operations.
  files:
    - web/clawser-wsh-virtual-terminal-manager.js
    - web/clawser-wsh-virtual-terminal-manager.d.ts
    - web/clawser-wsh-virtual-terminal-session.js
  api:
    - VirtualTerminalManager
    - VirtualTerminalManager.registerPeerContext
    - VirtualTerminalManager.openChannel
    - VirtualTerminalManager.tryReattachChannel
    - VirtualTerminalManager.writeToChannel
    - VirtualTerminalManager.resizeChannel
    - VirtualTerminalManager.signalChannel
    - VirtualTerminalManager.closeChannel
    - VirtualTerminalManager.closePeerContext
    - buildReverseParticipantKey
  category: wsh
  since: "1.5.0"

- name: Kernel WSH Bridge
  status: implemented
  description: >
    Bridge between the kernel microkernel and WSH subsystem. Handles guest joins,
    copilot attachments, session grants, reverse connects, and participant lifecycle.
  files:
    - web/clawser-kernel-wsh-bridge.js
    - web/clawser-kernel-wsh-bridge.d.ts
  api:
    - KernelWshBridge
    - KernelWshBridge.handleGuestJoin
    - KernelWshBridge.handleCopilotAttach
    - KernelWshBridge.handleSessionGrant
    - KernelWshBridge.handleReverseConnect
    - KernelWshBridge.handleParticipantLeave
    - KernelWshBridge.getTenantId
  category: wsh
  since: "2.0.0"

- name: Remote Access Gateway
  status: implemented
  description: >
    Pairing-based remote access system. Generates pairing codes with configurable
    length and expiry. Manages sessions with tokens, rate limiting, and revocation.
    Three agent tools: remote_pair, remote_revoke, remote_status.
  files:
    - web/clawser-remote.js
    - web/clawser-remote.d.ts
  api:
    - PairingManager
    - RateLimiter
    - GatewayClient
    - generatePairingCode
    - generateToken
    - RemotePairTool
    - RemoteRevokeTool
    - RemoteStatusTool
    - DEFAULT_CODE_LENGTH
    - DEFAULT_CODE_EXPIRY_MS
    - DEFAULT_TOKEN_EXPIRY_MS
    - DEFAULT_RATE_LIMIT
  category: remote
  since: "1.5.0"

- name: OAuth Integration
  status: implemented
  description: >
    OAuth 2.0 connection management for third-party services. OAuthConnection handles
    token storage with automatic refresh. OAuthManager manages connection lifecycle
    with vault integration. Supports 9+ providers (Google, GitHub, Slack, etc).
    Four agent tools: oauth_list, oauth_connect, oauth_disconnect, oauth_api.
  files:
    - web/clawser-oauth.js
    - web/clawser-oauth.d.ts
  api:
    - OAuthManager
    - OAuthConnection
    - OAuthConnection.fetch
    - oauth_list
    - oauth_connect
    - oauth_disconnect
    - oauth_api
  category: oauth
  notes: "Supported providers: Google, GitHub, Slack, and 6+ others. OAuthConnection.fetch() adds auth headers automatically."
  since: "1.5.0"

- name: Auth Profiles
  status: implemented
  description: >
    Multi-profile authentication system. Multiple auth profiles per provider with
    active profile switching. Profiles include provider, authType (api_key/oauth/token/none),
    baseUrl, defaultModel, and metadata. Credentials stored in vault.
  files:
    - web/clawser-auth-profiles.js
    - web/clawser-auth-profiles.d.ts
  api:
    - AuthProfileManager
    - AuthProfile
    - AuthListProfilesTool
    - AuthSwitchProfileTool
    - AuthStatusTool
  category: auth
  notes: "Auth types: api_key, oauth, token, none."
  since: "1.5.0"

- name: MCP Client
  status: implemented
  description: >
    Model Context Protocol client for connecting to external MCP servers. McpClient
    handles single server connections with endpoint, tool discovery, and JSON-RPC
    calling. McpManager orchestrates multiple server connections with svc:// prefix
    routing. WebMCPDiscovery parses tool descriptors from web pages.
  files:
    - web/clawser-mcp.js
    - web/clawser-mcp.d.ts
  api:
    - McpClient
    - McpManager
    - WebMCPDiscovery
  category: mcp
  notes: JSON-RPC over HTTP with 30-second configurable timeout. Tools auto-registered with svc:// prefix.
  since: "2.0.0"

- name: CORS Fetch
  status: implemented
  description: >
    CORS-aware fetch utility via the Chrome extension. Bypasses same-origin
    restrictions for approved requests.
  files:
    - web/clawser-cors-fetch.js
    - web/clawser-cors-fetch-util.js
  api:
    - corsFetch
    - ext_cors_fetch
  category: network
  since: "2.0.0"

- name: Tunnel/Proxy
  status: implemented
  description: >
    Network tunnel and proxy support for routing traffic through relay servers.
  files:
    - web/clawser-tunnel.js
  api:
    - tunnel
  category: network
  since: "2.0.0"

- name: Virtual Network (Netway)
  status: implemented
  description: >
    Browser-native virtual networking layer. Supports TCP/UDP-like connections
    via in-memory transport (mem://), with plans for real network transports.
    Eight agent tools for socket operations.
  files:
    - web/clawser-netway-tools.js
    - web/clawser-netway-tools.d.ts
  api:
    - NetwayConnectTool
    - NetwayListenTool
    - NetwaySendTool
    - NetwayReadTool
    - NetwayCloseTool
    - NetwayResolveTool
    - NetwayStatusTool
    - NetwayUdpSendTool
    - registerNetwayTools
    - getVirtualNetwork
  category: netway
  since: "2.0.0"

- name: QR Code Generation
  status: implemented
  description: >
    QR code generation for sharing pairing codes and connection URLs.
  files:
    - web/clawser-qr.js
  api:
    - generateQR
  category: utility
  since: "1.5.0"
