# Clawser Skills — Skill system, lifecycle, registry, validation, slash commands, agentskills.io
# Source of truth for the skill subsystem

- name: SkillParser
  status: implemented
  description: >
    Parses SKILL.md files with YAML frontmatter and markdown body. Validates metadata
    fields, checks script safety (detects dangerous patterns), and escapes attributes.
    Implements the agentskills.io standard format.
  files:
    - web/clawser-skills.js
    - web/clawser-skills.d.ts
  api:
    - SkillParser
  category: parser
  notes: >
    SKILL.md format: YAML frontmatter (name, version, description, author, tools, scripts)
    followed by markdown instructions body.
  since: "1.0.0"
  see_also:
    - SkillStorage
    - SkillRegistry

- name: SkillStorage
  status: implemented
  description: >
    OPFS-based skill persistence with global and per-workspace scoping. Global skills
    live in clawser_skills/, workspace skills in clawser_workspaces/{wsId}/.skills/.
    Supports ZIP import/export for sharing.
  files:
    - web/clawser-skills.js
    - web/clawser-skills.d.ts
  api:
    - SkillStorage
  category: storage
  notes: Skills are stored as individual files in OPFS directories.
  since: "1.0.0"
  see_also:
    - Workspace Management

- name: SkillRegistry
  status: implemented
  description: >
    Local skill registry managing discovery, activation, and deactivation. Tracks
    which skills are active, registers their tools with the tool registry, and
    persists auto-enable state. Skills are injected into the system prompt pipeline
    when active.
  files:
    - web/clawser-skills.js
    - web/clawser-skills.d.ts
  api:
    - SkillRegistry
  category: registry
  notes: >
    SkillActivation contains the parsed body, scripts, references, and registered
    tool names for each active skill.
  since: "1.0.0"

- name: SkillRegistryClient
  status: implemented
  description: >
    Remote registry client for searching, fetching, installing, and version checking
    community skills from an online registry. Supports semver version comparison.
  files:
    - web/clawser-skills.js
    - web/clawser-skills.d.ts
  api:
    - SkillRegistryClient
  category: remote-registry
  notes: Registry URL is configurable. Implements search, fetch, install, and version check.
  since: "1.0.0"

- name: Skill Registry Server
  status: implemented
  description: >
    Server-side registry implementation for hosting a skill registry. Supports
    publishing, searching, and serving skill packages.
  files:
    - web/clawser-skills-registry-server.js
  api:
    - SkillsRegistryServer
  category: remote-registry
  since: "1.5.0"

- name: Skill Validation
  status: implemented
  description: >
    Safety validation for skill scripts. Detects dangerous patterns (eval, Function
    constructor, DOM manipulation, network access) and blocks skills with unsafe code.
    Validates YAML metadata fields against the agentskills.io schema.
  files:
    - web/clawser-skills.js
  api:
    - SkillParser
  category: validation
  since: "1.0.0"

- name: Skill Lifecycle
  status: implemented
  description: >
    Full lifecycle management — install from registry or ZIP, activate with arguments,
    deactivate, update to latest version, remove. Skills can register custom tools
    that appear in the tool registry while active.
  files:
    - web/clawser-skills.js
  api:
    - ActivateSkillTool
    - DeactivateSkillTool
    - SkillInstallTool
    - SkillUpdateTool
    - SkillRemoveTool
    - SkillListTool
    - SkillSearchTool
  category: lifecycle
  notes: >
    7 agent tools: activate_skill, deactivate_skill, skill_search, skill_install,
    skill_update, skill_remove, skill_list.
  since: "1.0.0"

- name: Skill ZIP Export/Import
  status: implemented
  description: >
    Export installed skills as ZIP bundles for sharing. Import skills from ZIP files.
    Includes skill manifest, instructions, and bundled assets.
  files:
    - web/clawser-skills.js
  api:
    - SkillStorage
  category: portability
  since: "1.0.0"

- name: Skill Semver Utilities
  status: implemented
  description: >
    Semantic versioning utilities for comparing skill versions and checking
    compatibility during updates.
  files:
    - web/clawser-skills.js
  api:
    - semverCompare
  category: versioning
  since: "1.0.0"

- name: agentskills.io Standard
  status: implemented
  description: >
    Implements the agentskills.io open standard for portable agent skills. Skills
    defined with this standard are interoperable across compatible agent platforms.
  files:
    - web/clawser-skills.js
    - web/clawser-skills.d.ts
    - web/types.d.ts
  api:
    - SkillManifest
  category: standard
  notes: "Standard format: YAML frontmatter with name, version, description, author, tools, scripts."
  since: "1.0.0"

- name: Skill Marketplace
  status: implemented
  description: >
    Browser-based marketplace UI for discovering, previewing, and installing skills
    from the remote registry.
  files:
    - web/clawser-marketplace.js
  api:
    - SkillMarketplace
  category: marketplace
  since: "1.5.0"
