# Clawser Pods — Pod architecture, ClawserPod, EmbeddedPod, InjectedPod, Chrome extension
# Source of truth for the pod subsystem

- name: Pod Base Class
  status: implemented
  description: >
    Core pod class from the browsermesh-pod package. Provides 6-phase boot sequence,
    wire protocol (HELLO, HELLO_ACK, GOODBYE, MESSAGE, RPC_REQUEST, RPC_RESPONSE),
    pod kind detection, and capability discovery.
  files:
    - web/packages-pod.js
  api:
    - Pod
    - detectPodKind
    - detectCapabilities
    - createHello
    - createHelloAck
    - createGoodbye
    - createMessage
    - createRpcRequest
    - createRpcResponse
    - installPodRuntime
    - createRuntime
    - createClient
    - createServer
  category: base
  notes: >
    Wire protocol constants: POD_HELLO, POD_HELLO_ACK, POD_GOODBYE, POD_MESSAGE,
    POD_RPC_REQUEST, POD_RPC_RESPONSE.
  since: "2.0.0"
  see_also:
    - ClawserPod
    - EmbeddedPod

- name: ClawserPod
  status: implemented
  description: >
    Full-featured Clawser pod extending the base Pod class. Initializes the complete
    mesh subsystem with 60+ lazy-loaded components including peer node, swarm coordinator,
    wallet, discovery, transport, audit chain, stream multiplexer, file transfer,
    service directory, sync engine, marketplace, quotas, consensus, relay, orchestrator,
    and more. Provides initMesh() and shutdown() lifecycle methods.
  files:
    - web/clawser-pod.js
  api:
    - ClawserPod
    - ClawserPod.initMesh
    - ClawserPod.shutdown
  category: clawser-pod
  notes: >
    60+ lazy-loaded subsystem getters including: peerNode, swarmCoordinator, wallet,
    registry, discoveryManager, transportNegotiator, auditChain, streamMultiplexer,
    fileTransfer, serviceDirectory, syncEngine, meshMarketplace, quotaManager,
    consensusManager, relayClient, nameResolver, orchestrator, meshACL, meshChat,
    gatewayNode, torrentManager, ipfsStore, federatedCompute, agentSwarmCoordinator,
    meshScheduler, healthMonitor, timestampAuthority, stealthAgent, escrowManager,
    dhtNode, creditLedger, groupKeyManager, pbftConsensus, and more.
  since: "2.0.0"
  see_also:
    - Mesh Peer
    - Mesh Swarm

- name: EmbeddedPod
  status: implemented
  description: >
    Lightweight embeddable pod for integrating Clawser into external applications.
    Provides a simple API: sendMessage(), on()/off() event handling, setAgent(),
    and config access. Used as the ClawserEmbed export for embedding.
  files:
    - web/clawser-embed.js
  api:
    - EmbeddedPod
    - ClawserEmbed
  category: embedded
  notes: Exported as ClawserEmbed alias for external use.
  since: "2.0.0"

- name: InjectedPod
  status: implemented
  description: >
    Pod variant for injecting Clawser capabilities into existing web pages.
    Used by the Chrome extension to inject agent functionality into any website.
  files:
    - web/packages-pod.js
  api:
    - InjectedPod
  category: injected
  since: "2.0.0"
  see_also:
    - Chrome Extension

- name: Chrome Extension
  status: implemented
  description: >
    Chrome extension (Clawser Browser Control) that injects an InjectedPod into
    web pages. Provides 32 extension tools for tab management, DOM interaction,
    form filling, screenshots, cookie access, console monitoring, and network
    request inspection. Uses RPC-based communication between the extension and
    the Clawser web app.
  files:
    - web/clawser-extension-tools.js
    - web/clawser-extension-tools.d.ts
  api:
    - ExtensionRpcClient
    - registerExtensionTools
  category: extension
  notes: >
    Available at Chrome Web Store. 32 tools across categories: status/info, tab management,
    navigation, screenshots, DOM reading, input simulation, forms, monitoring, execution,
    cookies, and WebMCP discovery.
  since: "1.5.0"
  see_also:
    - Browser Automation

- name: Browser Automation
  status: implemented
  description: >
    Automated browser interaction via the chrome extension or native APIs.
    AutomationSession manages tab sessions with domain allowlists. AutomationManager
    coordinates multi-session automation. Includes workflow recording and export
    as skill or JSON.
  files:
    - web/clawser-browser-auto.js
    - web/clawser-browser-auto.d.ts
  api:
    - AutomationSession
    - AutomationManager
    - PageSnapshot
    - WorkflowRecorder
    - BrowserOpenTool
    - BrowserReadPageTool
    - BrowserClickTool
    - BrowserFillTool
    - BrowserWaitTool
    - BrowserEvaluateTool
    - BrowserListTabsTool
    - BrowserCloseTabTool
  category: automation
  notes: >
    PageSnapshot captures URL, title, text, links, forms, and interactive elements.
    WorkflowRecorder can export recorded steps as a skill or JSON.
  since: "1.5.0"

- name: Kernel Package
  status: implemented
  description: >
    Microkernel package (packages-kernel) providing foundational services: ResourceTable,
    ByteStream, Clock, RNG, ServiceRegistry (svc:// URLs), Logger, Tracer, Signal,
    Caps (capabilities), Env, Stdio, MessagePort, Constants, and Errors.
    Approximately 2,862 LOC across 16 ES modules.
  files:
    - web/packages/kernel/src/index.mjs
    - web/packages/kernel/src/kernel.mjs
    - web/packages/kernel/src/service-registry.mjs
    - web/packages/kernel/src/resource-table.mjs
    - web/packages/kernel/src/message-port.mjs
    - web/packages/kernel/src/signal.mjs
    - web/packages/kernel/src/logger.mjs
    - web/packages/kernel/src/errors.mjs
    - web/packages/kernel/src/byte-stream.mjs
    - web/packages/kernel/src/stdio.mjs
    - web/packages/kernel/src/caps.mjs
    - web/packages/kernel/src/env.mjs
    - web/packages/kernel/src/chaos.mjs
    - web/packages/kernel/src/clock.mjs
    - web/packages/kernel/src/constants.mjs
    - web/packages/kernel/src/rng.mjs
    - web/packages/kernel/src/tracer.mjs
  api:
    - Kernel
    - ServiceRegistry
    - ResourceTable
    - ByteStream
    - Clock
    - RNG
    - Logger
    - Tracer
    - Signal
    - Caps
    - Env
    - Stdio
    - MessagePort
  category: kernel
  notes: 16 ES modules providing microkernel services. Tenant isolation and capability enforcement.
  since: "2.0.0"

