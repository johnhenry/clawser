# Clawser Daemon — Multi-tab coordination, SharedWorker, daemon mode, checkpoint/resume, lifecycle
# Source of truth for the daemon subsystem

- name: DaemonState
  status: implemented
  description: >
    Phase-based state machine for daemon lifecycle. Tracks daemon phase transitions:
    stopped, starting, running, checkpointing, paused, recovering, error. Manages
    state transitions with validation.
  files:
    - web/clawser-daemon.js
    - web/clawser-daemon.d.ts
  api:
    - DaemonState
    - DaemonPhase
    - DaemonTransition
  category: state
  notes: "Phases: stopped → starting → running → checkpointing → paused → recovering → error."
  since: "1.5.0"
  see_also:
    - CheckpointManager
    - DaemonController

- name: DaemonController
  status: implemented
  description: >
    Main daemon orchestrator. Controls the background execution lifecycle with
    periodic checkpointing. Agent continues running tasks even when tab is not focused.
    Configurable wake intervals and checkpoint frequency.
  files:
    - web/clawser-daemon.js
    - web/clawser-daemon.d.ts
  api:
    - DaemonController
  category: controller
  since: "1.5.0"

- name: CheckpointManager
  status: implemented
  description: >
    State persistence manager for daemon checkpoints. Supports v2 directory-based
    and v1 file-based checkpoint formats. Enforces max checkpoint limit. Checkpoints
    stored in IndexedDB with metadata indexing.
  files:
    - web/clawser-daemon.js
    - web/clawser-daemon.d.ts
    - web/clawser-checkpoint-idb.js
  api:
    - CheckpointManager
    - CheckpointMeta
    - CheckpointRestoreResult
  category: checkpoint
  notes: Three-level fallback hierarchy for checkpoint storage.
  since: "1.5.0"

- name: TabCoordinator
  status: implemented
  description: >
    BroadcastChannel-based coordination between multiple Clawser tabs. Tab ID
    assignment and discovery, message passing, singleton enforcement, and leader
    election. One tab becomes the "leader" via election; others defer background
    tasks to it.
  files:
    - web/clawser-daemon.js
    - web/clawser-daemon.d.ts
  api:
    - TabCoordinator
    - TabInfo
  category: multi-tab
  since: "1.5.0"

- name: InputLockManager
  status: implemented
  description: >
    Manages input locking across tabs to prevent concurrent user input when
    daemon mode is active in a specific tab.
  files:
    - web/clawser-daemon.js
    - web/clawser-daemon.d.ts
  api:
    - InputLockManager
  category: multi-tab
  since: "1.5.0"

- name: NotificationCenter
  status: implemented
  description: >
    Daemon notification center for alerting users about daemon state changes,
    checkpoint events, and error conditions.
  files:
    - web/clawser-daemon.js
    - web/clawser-daemon.d.ts
  api:
    - NotificationCenter
    - Notification
  category: notifications
  since: "1.5.0"

- name: SharedWorker Client
  status: implemented
  description: >
    Client-side interface for communicating with the SharedWorker. Enables
    cross-tab state sharing and background processing coordination.
  files:
    - web/clawser-shared-worker-client.js
    - web/shared-worker.js
  api:
    - SharedWorkerClient
  category: shared-worker
  since: "1.5.0"

- name: Service Worker Heartbeat
  status: implemented
  description: >
    Service Worker-based heartbeat for detecting tab liveness and coordinating
    daemon responsibilities. Sends periodic pings to verify tab health.
  files:
    - web/clawser-sw-heartbeat.js
    - web/sw.js
  api:
    - SWHeartbeat
  category: heartbeat
  since: "1.5.0"

- name: Background Runner
  status: implemented
  description: >
    Background task execution engine. Runs agent tasks in the background
    with progress tracking and error recovery.
  files:
    - web/clawser-background-runner.js
  api:
    - BackgroundRunner
  category: execution
  since: "1.5.0"

- name: Daemon Tools
  status: implemented
  description: >
    Five agent tools for daemon management: daemon_status, daemon_checkpoint,
    daemon_pause, daemon_resume, daemon_restore.
  files:
    - web/clawser-daemon.js
    - web/clawser-daemon.d.ts
  api:
    - DaemonStatusTool
    - DaemonCheckpointTool
    - DaemonPauseTool
    - DaemonResumeTool
    - DaemonRestoreTool
  category: tools
  since: "1.5.0"

- name: Cross-Tab Tool Bridge
  status: implemented
  description: >
    Bridges tool execution across browser tabs via BroadcastChannel. Allows
    one tab to invoke tools registered in another tab.
  files:
    - web/clawser-daemon.js
  api:
    - cross_tab_tool_bridge
  category: multi-tab
  since: "2.0.0"

- name: Wake Lock
  status: partial
  description: >
    Screen Wake Lock API integration to prevent the device from sleeping during
    long-running agent tasks. Falls back gracefully when the API is unavailable.
  files:
    - web/clawser-daemon.js
  api:
    - wakeLock
  category: power
  notes: Requires HTTPS and a visible tab. Not supported in all browsers.
  since: "1.5.0"
