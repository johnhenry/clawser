- name: Sandbox (Andbox)
  status: implemented
  description: >
    Sandboxed code execution environment using Web Workers and WASM. Multiple
    capability tiers (minimal, web, fs, full, agent) with CapabilityGate enforcement.
    WorkerSandbox and WasmSandbox implementations.
  files:
    - web/clawser-sandbox.js
    - web/clawser-sandbox.d.ts
  api:
    - CapabilityGate
    - WorkerSandbox
    - WasmSandbox
    - SandboxManager
    - SandboxRunTool
    - SandboxStatusTool
    - SANDBOX_TIERS
    - CAPABILITIES
    - SANDBOX_LIMITS
  category: sandbox
  notes: "Tiers: minimal, web, fs, full, agent. Each tier grants progressively more capabilities."
  since: "1.5.0"
