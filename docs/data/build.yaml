# Clawser Build — Zero build step, PWA, Docker, CI/CD, browser compat, CDN deps, testing
# Source of truth for the build and deployment subsystem

- name: Zero Build Step
  status: implemented
  description: >
    No build step required. Pure ES modules served directly from the web/ directory.
    All 240+ modules are pre-compiled .js bundles with accompanying .d.ts type definitions.
    External dependencies loaded via CDN (cdnjs.cloudflare.com). Zero npm runtime deps.
  files:
    - web/
    - package.json
  api: []
  category: build
  notes: >
    External CDN dependencies include ai.matey, BrowserMesh packages, html2canvas,
    and utility libraries. All loaded on demand.
  since: "1.0.0"

- name: Development Server
  status: implemented
  description: >
    HTTPS dev server via web/serve-https.mjs or HTTP fallback via npx serve on port 8080.
    HTTPS recommended for Web Crypto API and Service Worker support.
  files:
    - web/serve-https.mjs
    - web/Procfile
  api: []
  category: server
  notes: "Commands: npm start (HTTPS), npm run start:http (HTTP on :8080)."
  since: "1.0.0"

- name: PWA (Progressive Web App)
  status: implemented
  description: >
    Installable as a Progressive Web App. Service Worker (sw.js) provides offline
    caching and background sync. PWA manifest enables home screen installation
    on mobile and desktop. Manifest fields: id, display, display_override
    (window-controls-overlay / standalone / minimal-ui), categories
    (developer/productivity/utilities), orientation, shortcuts (New chat,
    Terminal), icons (192/512 + SVG, maskable).
  files:
    - web/sw.js
    - web/manifest.json
  api: []
  category: pwa
  since: "1.0.0"

- name: PWA Install Flow
  status: implemented
  description: >
    Captures the browser-fired beforeinstallprompt event, exposes an
    imperative tryInstall() to surface the native install prompt, and
    notifies subscribers when the app becomes installable or installed.
    Detects standalone mode (iOS Safari home-screen install or display-mode
    standalone media query) and platform (iOS/Android/desktop). Wired in
    clawser-app.js at boot.
  files:
    - web/clawser-pwa-install.js
    - web/clawser-app.js
    - web/manifest.json
  api:
    - initPwaInstall
    - tryInstall
    - getInstallState
    - onInstallStateChange
    - isStandalone
    - detectPlatform
  category: pwa
  notes: >
    Returned outcome from tryInstall(): 'accepted' | 'dismissed' | 'unavailable'.
    iOS Safari has no beforeinstallprompt; getInstallState reports
    installable=false there but isStandalone correctly detects
    Add-to-Home-Screen.
  since: "2.1.0"
  see_also:
    - PWA (Progressive Web App)

- name: Docker Deployment
  status: implemented
  description: >
