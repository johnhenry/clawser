- name: Test Suite
  status: implemented
  description: >
    Comprehensive test infrastructure with 300+ test files and 8,800+ tests
    across 12 test groups. Custom test runner (run-tests.mjs) plus vitest for
    unit tests and Playwright for E2E tests.
  files:
    - web/test/
    - vitest.config.js
    - playwright.config.js
  api: []
  category: testing
  notes: >
    Test groups: core, mesh, mesh-net, mesh-sync, mesh-identity, mesh-apps,
    mesh-ops, e2e, and changed-files-only.
    Commands: npm test (all), npm run test:fast (fast subset), npm run test:core
    (core only), npm run test:e2e (end-to-end), npm run test:changed (changed files).
  since: "1.0.0"

