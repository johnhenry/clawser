- name: Performance Benchmarks
  status: implemented
  description: >
    Performance benchmark page for measuring tool execution times, LLM latencies,
    context compaction speed, and memory usage.
  files:
    - web/bench.html
  api: []
  category: benchmarks
  notes: >
    Performance targets: less than 64MB memory, less than 100ms startup,
    less than 100ms tool execution, less than 2s context compaction.
  since: "1.0.0"

- name: Browser Compatibility
  status: implemented
  description: >
    Targets modern browsers with ES2022+ module support. Requires Web Crypto API,
    OPFS (Origin Private File System), BroadcastChannel, and SharedWorker.
    Chrome 127+ recommended for Chrome AI features.
  files: []
  api: []
  category: compat
  notes: >
    Required APIs: ES Modules, Web Crypto, OPFS, BroadcastChannel, SharedWorker,
    Fetch, AbortController. Optional: Web Serial, Web Bluetooth, WebUSB, Screen Wake Lock.
  since: "1.0.0"

