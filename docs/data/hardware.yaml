# Clawser Hardware — Serial, Bluetooth, USB, peripheral discovery
# Source of truth for the hardware integration subsystem

- name: PeripheralManager
  status: implemented
  description: >
    Central device manager for all hardware peripherals. Handles connection lifecycle,
    reconnection logic, and device enumeration. Supports Serial, Bluetooth, and USB
    devices via Web APIs.
  files:
    - web/clawser-hardware.js
    - web/clawser-hardware.d.ts
  api:
    - PeripheralManager
    - PeripheralManager.connect
    - PeripheralManager.disconnect
    - PeripheralManager.send
    - PeripheralManager.read
    - PeripheralManager.get
    - PeripheralManager.list
    - PeripheralManager.requestSerial
    - PeripheralManager.requestBluetooth
    - PeripheralManager.requestUSB
    - PeripheralManager.reconnectSerial
    - PeripheralManager.reconnectUSB
    - PeripheralManager.reconnectBluetooth
    - PeripheralManager.disconnectAll
    - PERIPHERAL_TYPES
  category: manager
  notes: "PERIPHERAL_TYPES: SERIAL, BLUETOOTH, USB."
  since: "1.5.0"
  see_also:
    - Serial Peripherals
    - Bluetooth Peripherals
    - USB Peripherals

- name: PeripheralHandle
  status: implemented
  description: >
    Base class for all peripheral device handles. Provides common interface
    with id, type, connected status, name, and methods for connect, disconnect,
    send, read, and info.
  files:
    - web/clawser-hardware.js
    - web/clawser-hardware.d.ts
  api:
    - PeripheralHandle
    - PeripheralHandle.connect
    - PeripheralHandle.disconnect
    - PeripheralHandle.send
    - PeripheralHandle.read
    - PeripheralHandle.info
  category: base
  since: "1.5.0"

- name: Serial Peripherals
  status: implemented
  description: >
    Web Serial API integration for connecting to serial port devices. Configurable
    baud rate, data bits, stop bits, and parity. Supports Arduino, microcontrollers,
    and other serial devices.
  files:
    - web/clawser-hardware.js
    - web/clawser-hardware.d.ts
  api:
    - SerialPeripheral
  category: serial
  notes: Requires HTTPS. Uses Web Serial API (navigator.serial).
  since: "1.5.0"

- name: Bluetooth Peripherals
  status: implemented
  description: >
    Web Bluetooth API integration for BLE device communication. Supports
    GATT service/characteristic subscription and unsubscription for real-time
    data streaming from BLE sensors and devices.
  files:
    - web/clawser-hardware.js
    - web/clawser-hardware.d.ts
  api:
    - BluetoothPeripheral
    - BluetoothPeripheral.subscribe
    - BluetoothPeripheral.unsubscribe
  category: bluetooth
  notes: Requires HTTPS. Uses Web Bluetooth API (navigator.bluetooth).
  since: "1.5.0"

- name: USB Peripherals
  status: implemented
  description: >
    WebUSB API integration for direct USB device communication. Supports
    bulk transfers and control transfers for USB devices.
  files:
    - web/clawser-hardware.js
    - web/clawser-hardware.d.ts
  api:
    - USBPeripheral
  category: usb
  notes: Requires HTTPS. Uses WebUSB API (navigator.usb).
  since: "1.5.0"

- name: Hardware Tools
  status: implemented
  description: >
    Six agent tools for hardware interaction: hw_list, hw_connect, hw_send,
    hw_read, hw_disconnect, hw_info.
  files:
    - web/clawser-hardware.js
    - web/clawser-hardware.d.ts
  api:
    - HwListTool
    - HwConnectTool
    - HwSendTool
    - HwReadTool
    - HwDisconnectTool
    - HwInfoTool
  category: tools
  since: "1.5.0"

