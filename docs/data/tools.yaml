# ─── MCP TOOLS (DYNAMIC) ─────────────────────────────────────────────

- name: MCP Tools (Dynamic)
  status: implemented
  description: >
    Tools dynamically discovered from connected MCP servers via JSON-RPC. Each MCP server
    exposes its own set of tools which are registered at runtime with svc:// prefix routing.
    Tool count varies based on connected servers.
  files:
    - web/clawser-mcp.js
    - web/clawser-mcp.d.ts
  api:
    - McpClient
    - McpManager
    - WebMCPDiscovery
  category: mcp
  notes: >
    MCP tools are not statically defined — they are discovered at runtime from connected servers.
    The McpManager supports multiple concurrent server connections with svc:// prefix routing.
  since: "2.0.0"
