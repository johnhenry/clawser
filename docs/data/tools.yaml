# Clawser Tools — Complete reference for ALL registered tools (285+)
# Source of truth for the tool registry

# ─── NETWORK TOOLS ───────────────────────────────────────────────────

- name: browser_fetch
  status: implemented
  description: HTTP/HTTPS requests with configurable domain allowlist. Returns status, headers, and body text (truncated at 50K chars).
  files:
    - web/clawser-tools.js
    - web/clawser-tools.d.ts
  api:
    - browser_fetch
  category: network
  permission: network
  notes: "Parameters: url (required), method (GET/POST/PUT/DELETE/PATCH), headers (object), body (string). Enforces domain allowlist."
  since: "1.0.0"

- name: browser_web_search
  status: implemented
  description: Search the web using DuckDuckGo HTML lite endpoint. No API key required.
  files:
    - web/clawser-tools.js
  api:
    - browser_web_search
  category: network
  permission: network
  notes: "Parameters: query (required), max_results (number). Uses DuckDuckGo lite."
  since: "1.0.0"

# ─── DOM TOOLS ────────────────────────────────────────────────────────

- name: browser_dom_query
  status: implemented
  description: Query DOM elements using CSS selectors. Returns text content, attributes, and structure.
  files:
    - web/clawser-tools.js
  api:
    - browser_dom_query
  category: dom
  permission: browser
  notes: "Parameters: selector (required), limit (default 10), include_html (boolean)."
  since: "1.0.0"

- name: browser_dom_modify
  status: implemented
  description: >
    Modify DOM elements — setText, setHTML, setAttribute, setStyle, addClass, removeClass,
    remove, insertHTML. Sanitizes HTML to block scripts, iframes, and event handlers.
  files:
    - web/clawser-tools.js
  api:
    - browser_dom_modify
  category: dom
  permission: browser
  notes: Uses native Sanitizer API when available. XSS prevention built in.
  since: "1.0.0"

# ─── FILESYSTEM TOOLS ────────────────────────────────────────────────

- name: browser_fs_read
  status: implemented
  description: Read a file from the Origin Private File System (OPFS). Max read size 50MB.
  files:
    - web/clawser-tools.js
  api:
    - browser_fs_read
  category: filesystem
  permission: read
  notes: "Parameters: path (required), encoding (utf8/base64, default utf8)."
  since: "1.0.0"

- name: browser_fs_write
  status: implemented
  description: Write a file to OPFS. Creates parent directories as needed. Max 10MB default.
  files:
    - web/clawser-tools.js
  api:
    - browser_fs_write
  category: filesystem
  permission: write
  notes: "Parameters: path (required), content (required), encoding. Checks storage quota — warns at 80%, blocks at 95%."
  since: "1.0.0"

- name: browser_fs_list
  status: implemented
  description: List files and directories in OPFS.
  files:
    - web/clawser-tools.js
  api:
    - browser_fs_list
  category: filesystem
  permission: read
  notes: "Parameters: path (default /), recursive (boolean)."
  since: "1.0.0"

- name: browser_fs_delete
  status: implemented
  description: Delete a file or directory from OPFS with optional recursive flag.
  files:
    - web/clawser-tools.js
  api:
    - browser_fs_delete
  category: filesystem
  permission: write
  notes: "Parameters: path (required), recursive (boolean)."
  since: "1.0.0"

- name: browser_fs_mkdir
  status: implemented
  description: Create a directory in OPFS. Creates parent directories as needed.
  files:
    - web/clawser-tools.js
  api:
    - browser_fs_mkdir
  category: filesystem
  permission: write
  since: "1.0.0"

