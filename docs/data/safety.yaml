# Clawser Safety — Self-repair watchdog, heartbeat, sanitization, scanning, XSS prevention, autonomy
# Source of truth for the safety and self-repair subsystem

- name: SafetyPipeline
  status: implemented
  description: >
    Three-stage defense-in-depth pipeline applied to every message and tool call.
    Stage 1: InputSanitizer strips invisible Unicode and detects injection patterns.
    Stage 2: ToolCallValidator checks path traversal, dangerous shell commands, unsafe URLs.
    Stage 3: LeakDetector scans output for credential leaks and PII.
    Requires explicit confirmation to disable.
  files:
    - web/clawser-safety.js
    - web/clawser-safety.d.ts
  api:
    - SafetyPipeline
    - SafetyPipeline.enabled
    - SafetyPipeline.confirmDisable
    - SafetyPipeline.confirmEnable
    - SafetyPipeline.sanitizeInput
    - SafetyPipeline.validateToolCall
    - SafetyPipeline.scanOutput
    - SafetyPipeline.sanitizer
    - SafetyPipeline.validator
    - SafetyPipeline.leakDetector
  category: pipeline
  notes: Critical severity blocks execution; medium/low severity warns only.
  since: "1.0.0"
  see_also:
    - InputSanitizer
    - ToolCallValidator
    - LeakDetector

- name: InputSanitizer
  status: implemented
  description: >
    User input sanitization with flag detection. Strips invisible Unicode characters,
    detects prompt injection patterns, and flags suspicious input.
  files:
    - web/clawser-safety.js
    - web/clawser-safety.d.ts
  api:
    - InputSanitizer
    - InputSanitizer.sanitize
  category: input
  since: "1.0.0"

- name: ToolCallValidator
  status: implemented
  description: >
    Tool call validation with severity levels (critical, high, medium, low). Checks
    for path traversal, dangerous shell commands, unsafe URLs, and other potentially
    harmful tool parameters.
  files:
    - web/clawser-safety.js
    - web/clawser-safety.d.ts
  api:
    - ToolCallValidator
    - ToolCallValidator.validate
  category: tool-validation
  since: "1.0.0"

- name: LeakDetector
  status: implemented
  description: >
    Pattern-based PII and credential detection in agent output. Detects API keys
    (OpenAI, Anthropic, GitHub, AWS), connection strings, JWTs, and RSA/EC private
    keys. Actions: redact (replace with placeholder), warn (flag but allow), block
    (prevent output). Configurable patterns.
  files:
    - web/clawser-safety.js
    - web/clawser-safety.d.ts
  api:
    - LeakDetector
    - LeakDetector.scan
    - LeakDetector.redact
    - LeakDetector.hasBlockingFindings
  category: output-scanning
  notes: RSA/EC private keys block output entirely. JWTs trigger warnings. API keys are auto-redacted.
  since: "1.0.0"

- name: PolicyEngine
  status: implemented
  description: >
    Configurable rules engine for input, tool call, and output policies. Supports
    custom rules with name, target, condition, action, priority, and enable/disable.
    Integrates with AutonomyController for fine-grained tool-level decisions.
  files:
    - web/clawser-policy-engine.js
  api:
    - PolicyEngine
    - PolicyEngine.addRule
    - PolicyEngine.removeRule
    - PolicyEngine.listRules
    - PolicyEngine.setEnabled
    - PolicyEngine.evaluateInput
    - PolicyEngine.evaluateToolCall
    - PolicyEngine.evaluateOutput
    - PolicyEngine.toJSON
    - PolicyEngine.fromJSON
  category: policy
  since: "1.5.0"
  see_also:
    - AutonomyController

- name: Self-Repair Engine
  status: implemented
  description: >
    Detects stuck states and applies recovery strategies. StuckDetector checks for
    tool timeouts, no-progress conditions, loop detection, context pressure, consecutive
    errors, and cost runaway. SelfRepairEngine applies recovery strategies per issue type
    with configurable handlers and repair logging.
  files:
    - web/clawser-self-repair.js
    - web/clawser-self-repair.d.ts
  api:
    - SelfRepairEngine
    - SelfRepairEngine.check
    - SelfRepairEngine.enabled
    - SelfRepairEngine.repairLog
    - SelfRepairEngine.clearLog
    - SelfRepairEngine.registerHandler
    - SelfRepairEngine.getSummary
    - StuckDetector
    - StuckDetector.detect
    - StuckDetector.setThresholds
    - StuckDetector.resetThresholds
    - findDuplicateSequences
    - DEFAULT_THRESHOLDS
    - ISSUE_TYPES
    - RECOVERY_STRATEGIES
  category: self-repair
  notes: >
    DEFAULT_THRESHOLDS: toolTimeout (60s), noProgress (120s), loopDetection (3 duplicates),
    contextPressure (0.95), consecutiveErrors (5), costRunaway ($2.00).
    ISSUE_TYPES: tool_timeout, no_progress, loop_detected, context_pressure,
    consecutive_errors, cost_runaway.
  since: "1.5.0"
  see_also:
    - Error Classification

- name: Self-Repair Tools
  status: implemented
  description: >
    Two agent tools: self_repair_status (check system health) and self_repair_configure
    (set repair thresholds and policies).
  files:
    - web/clawser-self-repair.js
    - web/clawser-self-repair.d.ts
  api:
    - SelfRepairStatusTool
    - SelfRepairConfigureTool
  category: tools
  since: "1.5.0"

- name: Secret Vault
  status: implemented
  description: >
    AES-GCM-256 encrypted storage for API keys and secrets. Uses PBKDF2 with 600,000
    iterations for key derivation. Secrets stored in OPFS. Supports passphrase strength
    measurement and rekeying. Two storage backends: MemoryVaultStorage (testing) and
    OPFSVaultStorage (production).
  files:
    - web/clawser-vault.js
    - web/clawser-vault.d.ts
  api:
    - SecretVault
    - MemoryVaultStorage
    - OPFSVaultStorage
    - VaultRekeyer
    - deriveKey
    - encryptSecret
    - decryptSecret
    - measurePassphraseStrength
  category: vault
  notes: Passphrase never persisted. PBKDF2 with 600K iterations. AES-GCM-256 encryption.
  since: "1.0.0"

- name: Heartbeat Monitor
  status: implemented
  description: >
    Periodic health checks from a markdown checklist. Checks context capacity (under 80%),
    stuck scheduler jobs, daily cost caps, and storage usage. Silent on pass; alerts on
    failure. Custom checks loadable from HEARTBEAT.md. Two tools: heartbeat_status and
    heartbeat_run.
  files:
    - web/clawser-heartbeat.js
  api:
    - heartbeat_status
    - heartbeat_run
  category: heartbeat
  since: "1.5.0"

- name: XSS Prevention
  status: implemented
  description: >
    Built into dom_modify tool. Sanitizes HTML to block scripts, iframes, and event
    handlers. Uses native Sanitizer API when available, falls back to DOMPurify-style
    stripping.
  files:
    - web/clawser-tools.js
  api:
    - dom_modify
  category: xss
  since: "1.0.0"

- name: Domain Allowlist
  status: implemented
  description: >
    Configurable domain allowlist for the fetch tool and browser_open. Restricts
    which domains the agent can access via network tools.
  files:
    - web/clawser-tools.js
  api:
    - domainAllowlist
  category: network-security
  since: "1.0.0"

- name: File Size Limits
  status: implemented
  description: >
    Enforced file size limits for OPFS operations. fs_read max 50MB, fs_write max 10MB.
    Storage quota warnings at 80%, blocking at 95%.
  files:
    - web/clawser-tools.js
  api:
    - fs_read
    - fs_write
  category: file-security
  since: "1.0.0"

- name: Permission System
  status: implemented
  description: >
    Five-level permission hierarchy for tools: internal (agent-only), read (safe reads),
    write (filesystem/state mutations), network (HTTP/WebSocket), browser (DOM, clipboard,
    navigation). Approval gates for sensitive operations based on autonomy level.
  files:
    - web/clawser-tools.js
    - web/clawser-tools.d.ts
  api:
    - BrowserToolRegistry
    - ToolPermissionLevel
  category: permissions
  notes: "Levels: auto (always), approve (user confirms), denied (blocked)."
  since: "1.0.0"
  see_also:
    - AutonomyController
