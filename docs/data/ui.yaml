# Clawser UI — All panels, Command Palette, keyboard shortcuts, responsive design, themes
# Source of truth for the user interface subsystem

- name: Chat Interface
  status: implemented
  description: >
    Streaming chat with markdown rendering, code highlighting, collapsible tool calls,
    and message actions (copy, edit, retry, fork). Supports image and file attachments.
    Vision/multimodal input when provider supports it.
  files:
    - web/clawser-ui-chat.js
    - web/clawser-ui.js
  api:
    - renderChat
  category: chat
  since: "1.0.0"
  screenshot: panel-chat.png

- name: Command Palette
  status: implemented
  description: >
    Floating overlay (Cmd/Ctrl+K) for executing any registered tool outside the chat
    flow. Searchable tool list with typed parameter forms, required field validation,
    and inline results. Supports fuzzy matching.
  files:
    - web/clawser-cmd-palette.js
    - web/clawser-cmd-palette.d.ts
  api:
    - openCommandPalette
    - closeCommandPalette
    - renderCmdToolList
    - selectCmdTool
    - runCmdTool
    - initCmdPaletteListeners
  category: command-palette
  since: "1.0.0"
  screenshot: command-palette.png

- name: Panel System
  status: implemented
  description: >
    Tabbed side panels for all major subsystems. Non-essential panels use lazy
    rendering — DOM is populated on first navigation. Hash-based SPA routing
    across 12 panels.
  files:
    - web/clawser-ui-panels.js
    - web/clawser-ui-panels.d.ts
  api:
    - initPanelListeners
  category: panels
  since: "1.0.0"

- name: Files Panel
  status: implemented
  description: >
