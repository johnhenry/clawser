# Clawser Scheduling — Scheduler, Routines, triggers, guardrails, cron parser
# Source of truth for the scheduling/routine subsystem

- name: RoutineEngine
  status: implemented
  description: >
    Central routine orchestrator. Creates, manages, and executes routines with
    configurable triggers (cron, event, webhook), actions (prompt execution, tool
    invocation, step chains), and guardrails. Approximately 90 lines of type definitions
    with full runtime implementation.
  files:
    - web/clawser-routines.js
    - web/clawser-routines.d.ts
  api:
    - RoutineEngine
    - createRoutine
    - matchFilter
    - resetRoutineCounter
    - TRIGGER_TYPES
    - ACTION_TYPES
    - DEFAULT_GUARDRAILS
    - AUTO_DISABLE_THRESHOLD
  category: engine
  notes: >
    Trigger types: cron (5-field parser), event (EventTarget), webhook.
    Action types: prompt execution, tool invocation, step chains.
    Default guardrails: 3 runs/hour, $0.50/run, 5-minute timeout.
    Auto-disabled after 5 consecutive failures (AUTO_DISABLE_THRESHOLD).
  since: "1.5.0"
  see_also:
    - Routine Guardrails
    - Cron Parser
    - Scheduled Jobs

- name: Routine Guardrails
  status: implemented
  description: >
    Safety limits for routine execution: max runs per hour, max cost per run,
    execution timeout, approval requirement, notifications on completion/failure,
    and auto-disable on consecutive failures. All configurable per-routine.
  files:
    - web/clawser-routines.js
    - web/clawser-routines.d.ts
  api:
    - DEFAULT_GUARDRAILS
  category: guardrails
  notes: >
    DEFAULT_GUARDRAILS: maxRunsPerHour (3), maxCostPerRunCents (50), timeoutMs (300000),
    requireApproval (false), notifyOnComplete (false), autoDisableOnFailure (true).
  since: "1.5.0"

- name: Cron Parser
  status: implemented
  description: >
    Five-field cron expression parser (minute, hour, day-of-month, month, day-of-week).
    Used by both the RoutineEngine and the agent's built-in scheduler.
  files:
    - web/clawser-agent.js
  api:
    - ClawserAgent.parseCron
  category: cron
  since: "1.0.0"

- name: Routine Tools
  status: implemented
  description: >
    Seven agent tools for routine management: routine_create, routine_list,
    routine_delete, routine_history, routine_run, routine_toggle, routine_update.
  files:
    - web/clawser-routines.js
    - web/clawser-routines.d.ts
  api:
    - RoutineCreateTool
    - RoutineListTool
    - RoutineDeleteTool
    - RoutineHistoryTool
    - RoutineRunTool
    - RoutineToggleTool
    - RoutineUpdateTool
  category: tools
  since: "1.5.0"

- name: Scheduler Lane
  status: implemented
  description: >
    Routines execute through the Channel Gateway as virtual scheduler channels.
    Each routine gets key scheduler:{routineId} for serialization. Messages appear
    in chat with a green scheduler badge.
  files:
    - web/clawser-routines.js
    - web/clawser-gateway.js
  api:
    - RoutineEngine
  category: execution
  since: "1.5.0"
  see_also:
    - Channel Gateway

- name: Scheduled Jobs (Agent Scheduler)
  status: implemented
  description: >
    Simpler one-shot and interval scheduling built into ClawserAgent. Supports
    once (with delay), interval (with period), and cron types. Agent-level tick()
    processes jobs.
  files:
    - web/clawser-agent.js
  api:
    - addSchedulerJob
    - listSchedulerJobs
    - pauseSchedulerJob
    - resumeSchedulerJob
    - removeSchedulerJob
    - tick
  category: agent-scheduler
  notes: >
    Three schedule types: once (fire after delay), interval (fire every N ms),
    cron (fire on 5-field cron expression).
  since: "1.0.0"

- name: Scheduler CLI
  status: implemented
  description: >
    Shell command interface for routine management. 'cron' or 'schedule' command
    with subcommands for listing, adding, removing, pausing, resuming, inspecting
    history, and force-executing routines.
  files:
    - web/clawser-scheduler-cli.js
  api:
    - registerSchedulerCli
  category: cli
  notes: "Subcommands: list, add, remove, pause, resume, history, run, status. Supports duration parsing (5m, 1h, 30s)."
  since: "1.5.0"
