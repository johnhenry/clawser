    - buildMyDevicesViewModel
    - buildTrustedPublishersViewModel
    - buildMyDevicesController
    - buildTrustedPublishersController
    - renderMyDevicesPanel
    - renderTrustedPublishersPanel
    - showPairNewDeviceModal
    - deriveCapabilities
    - showPickerModal
  category: ui
  since: "2.0.0"
  see_also:
