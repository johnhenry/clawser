# Clawser Multi-Device — Personal device pairing and signed deploy targets
# Source of truth for the multi-device sync + deploy subsystem (11 modules across web/)

- name: Device Pairing
  status: implemented
  description: >
    QR-code / 6-digit-code flow for pairing a second browser under the same
    identity. The source device encrypts its Ed25519 `did:key` JWK with an
    AES-GCM key derived from a fresh 6-digit code (PBKDF2-SHA256, 100k
    iterations), wraps it in a `CLAWSER-PAIR:` text payload, and the target
    decrypts it after the user types the same code. Both devices end up
    sharing one identity.
  files:
    - web/clawser-pairing.mjs
  api:
    - generatePairingCode
    - createPairingPayload
    - parsePairingPayload
    - consumePairingPayload
    - createMemoryPairingStorage
  category: pairing
  notes: >
    Bundles expire after 5 minutes by default; a 6-digit code has ~20 bits
    of entropy, so brute-force resistance is time-bounded by design, not
    indefinite. Consumed `pairingId`s are tracked (capped at last 200) so
    the same payload can't be replayed on the same target device.
  since: "2.0.0"
  see_also:
    - Paired Devices Store
    - Multi-Device Wiring

- name: Paired Devices Store
  status: implemented
  description: >
    Per-identity registry of paired devices (label, peer pubkey, last
    sync timestamp, sync-enabled flag). Backs the "My Devices" settings
    panel and is what `publishDeployToAll` iterates over.
  files:
    - web/clawser-paired-devices.mjs
  api:
    - PairedDevicesStore
  category: pairing
  since: "2.0.0"
  see_also:
    - Device Pairing
    - Multi-Device Panels & Controllers

- name: Sync Flags
  status: implemented
  description: >
    Per-item "sync to my devices" flag storage. Skills, workspace configs,
    and memory items are addressed by a fully-qualified `{kind}:{id}` id
    (e.g. `skill:my-skill`, `config:autonomy`, `memory:abc123`) and opted
    into sync individually. Flags persist in an OPFS-backed JSON file and
    are not workspace-scoped.
  files:
    - web/clawser-sync-flags.mjs
  api:
    - flagId
    - SyncFlags
  category: sync
  since: "2.0.0"
  see_also:
    - Sync Engine
    - Deploy Publish

- name: Sync Engine
  status: implemented
  description: >
    Debounced (500ms default) outbound sync queue with kind-aware dispatch:
    `lww` payloads resolve via timestamp (ties broken lexicographically by
    source, for deterministic convergence between two peers); `yjs`
    payloads delegate to a pluggable `YjsApplicator`. Coalesces repeated
    updates to the same itemId so only the latest payload ships.
  files:
    - web/clawser-sync.mjs
  api:
    - lwwShouldReplace
    - SyncEngine
  category: sync
  since: "2.0.0"
  see_also:
    - Sync Flags
    - Multi-Device Wiring

- name: Deploy Package (signed manifests)
  status: implemented
  description: >
    Canonical JSON + SHA-256 hashing and Ed25519-signed package format for
    remote deploy. Signs `(version, sourceDid, counter, canonicalManifest)`
    as a single unit so tampering with any field invalidates the signature.
    `ReplayCounterTracker` rejects packages whose counter doesn't strictly
    exceed the last-seen value per source.
  files:
    - web/clawser-deploy-package.mjs
  api:
    - canonicalJson
    - sha256Hex
    - buildSignedPackage
    - verifySignedPackage
    - ReplayCounterTracker
  category: deploy
  since: "2.0.0"
  see_also:
    - Deploy Target (ACL, approvals, audit, rollback)
    - "[Protocol & threat model](../docs/DEPLOY.md)"

- name: Deploy Target (ACL, approvals, audit, rollback)
  status: implemented
  description: >
    Receive-side trust and safety layer for deploy packages: `DeployAcl`
    gates which `did:key:` sources are trusted, `DeployApprovals` caches
    one-time consent per manifest fingerprint, `DeployAuditLog` records
    every accepted/rejected/applied/rolled-back event, and
    `DeploySnapshotRing` takes a pre-deploy snapshot so an applied deploy
    can be rolled back. Capability tokens (`buildCapabilityToken`,
    `enforceCapabilityRequest`) ensure a manifest can only write the
    config/memory domains it explicitly declared.
  files:
    - web/clawser-deploy-target.mjs
  api:
    - DeployAcl
    - DeployApprovals
    - DeployAuditLog
    - DeploySnapshotRing
    - buildCapabilityToken
    - enforceCapabilityRequest
    - CapabilityDeniedError
    - acceptPackage
  category: deploy
  notes: >
    All per-workspace: ACL, approvals, audit log, snapshots, and the
    replay counter live under the active workspace, not globally, so a
    trust grant in one workspace doesn't extend to another.
  since: "2.0.0"
  see_also:
    - Deploy Package (signed manifests)
    - Deploy Apply Transport

- name: Deploy Apply Transport
  status: implemented
  description: >
    Per-kind handlers that actually persist an approved deploy's items:
    skills via `SkillStorage.writeSkill`, configs via `writeConfig` (gated
    against the manifest's declared `capabilities.config[]`), and memory
    entries via the agent's memory store (gated against
    `capabilities.memory[]`).
  files:
    - web/clawser-deploy-apply.mjs
  api:
    - handleSkillItem
    - handleConfigItem
    - handleMemoryItem
    - createApplyTransport
    - createDefaultApplyTransport
  category: deploy
  since: "2.0.0"
  see_also:
    - Deploy Target (ACL, approvals, audit, rollback)

- name: Deploy Publish & Flow
  status: implemented
  description: >
    Sender-side deploy flow: resolves flagged items into a manifest,
    signs and sends a `{type: 'deploy', package}` envelope to a target's
    pubkey via `pod.sendMessage`, and stamps `lastSyncAt` on the paired
    device entry. `publishDeployToAll` fans a deploy out to every paired
    device with `syncEnabled: true` in parallel — one peer's failure
    doesn't abort the others.
  files:
    - web/clawser-deploy-publish.mjs
    - web/clawser-deploy-flow.mjs
    - web/clawser-deploy.mjs
  api:
    - publishDeploy
    - publishDeployToAll
    - normalizePayloads
    - resolveDeployItems
    - runMeshDeployFlow
    - buildDeployPreview
    - runDeploy
    - recordLocalChange
  category: deploy
  since: "2.0.0"
  see_also:
    - Deploy Target (ACL, approvals, audit, rollback)
    - Paired Devices Store

- name: Multi-Device Wiring
  status: implemented
  description: >
    Binds the sync + deploy infrastructure classes into the active
    workspace's `state` and routes inbound `pod.onMessage` envelopes:
    `type: 'sync'` to the sync engine, `type: 'deploy'` to `acceptPackage`.
    Installed after the mesh pod is up; idempotent teardown clears state
    and unsubscribes on workspace switch.
  files:
    - web/clawser-multi-device.mjs
  api:
    - installMultiDeviceWiring
    - uninstallMultiDeviceWiring
  category: deploy
  since: "2.0.0"
  see_also:
    - Sync Engine
    - Deploy Target (ACL, approvals, audit, rollback)
    - "[Wiring status & storage paths](../docs/multi-device-deploy.md)"

- name: Multi-Device Panels & Controllers
