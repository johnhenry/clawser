# Clawser Agents — Named agents, delegation, sub-agents, @mentions, import/export
# Source of truth for the agent definition subsystem

- name: Agent Definitions
  status: implemented
  description: >
    Named agent configurations with custom system prompts, provider/model overrides,
    autonomy settings, tool restrictions, domain allowlists, cost caps, and max turns.
    Scoped as builtin (shipped), global (user-created), or workspace (project-specific).
    5 built-in starter agents included.
  files:
    - web/clawser-agent-storage.js
    - web/clawser-agent-storage.d.ts
  api:
    - AgentDefinition
    - BUILTIN_AGENTS
  category: definitions
  notes: >
    AgentDefinition fields: id, name, description, color, icon, model, accountId,
    systemPrompt, temperature, maxTokens, contextWindow, autonomy, tools (mode/list/permissionOverrides),
    domainAllowlist, maxCostPerTurn, maxTurnsPerRun, scope, workspaceId, createdAt, updatedAt.
  since: "1.0.0"
  see_also:
    - AgentStorage
    - Agent Picker Panel

- name: AgentStorage
  status: implemented
  description: >
    Persistent agent definition storage with global and workspace scoping. OPFS-backed
    with listGlobal, listWorkspace, listAll, save, load, delete, getActive, setActive.
    Includes built-in agent seeding, export as JSON, and import with validation.
  files:
    - web/clawser-agent-storage.js
    - web/clawser-agent-storage.d.ts
  api:
    - AgentStorage
    - AgentStorage.listGlobal
    - AgentStorage.listWorkspace
    - AgentStorage.listAll
    - AgentStorage.save
    - AgentStorage.load
    - AgentStorage.delete
    - AgentStorage.getActive
    - AgentStorage.setActive
    - AgentStorage.seedBuiltins
    - AgentStorage.exportAgent
    - AgentStorage.importAgent
    - generateAgentId
    - resolveAgentProvider
    - migrateAgentAccounts
  category: storage
  since: "1.0.0"

- name: Agent Switching
  status: implemented
  description: >
    Switch between named agent configurations at runtime. Applies the agent's
    system prompt, provider, model, autonomy settings, and tool restrictions.
    Also supports consulting another agent without switching (read-only query).
  files:
    - web/clawser-tools.js
  api:
    - switch_agent
    - consult_agent
  category: switching
  since: "1.0.0"

- name: Delegation
  status: implemented
  description: >
    Spawn isolated sub-agents for focused sub-tasks. Each sub-agent has its own
    conversation history but shares the parent's provider and tools. Supports
    concurrent execution via delegateAll. Max depth 2, max concurrency 3.
  files:
    - web/clawser-delegate.js
    - web/clawser-delegate.d.ts
  api:
    - SubAgent
    - DelegateManager
    - DelegateTool
    - MAX_DELEGATION_DEPTH
    - DEFAULT_MAX_ITERATIONS
    - DEFAULT_MAX_CONCURRENCY
  category: delegation
  notes: >
    SubAgentResult includes task, result, toolCalls, tokenUsage.
    SubAgentSummary aggregates multiple sub-agent results.
  since: "1.5.0"

- name: Agent Import/Export
  status: implemented
  description: >
    Export agent definitions as JSON for sharing. Import agent definitions from JSON
    with validation and deduplication.
  files:
    - web/clawser-agent-storage.js
    - web/clawser-agent-storage.d.ts
  api:
    - AgentStorage.exportAgent
    - AgentStorage.importAgent
  category: portability
  since: "1.0.0"
