# Clawser Mesh — BrowserMesh modules, identity, transport, CRDT, DHT, marketplace, consensus, swarm
# Source of truth for the mesh networking subsystem (43+ modules, 20,000+ LOC)

- name: Mesh Peer
  status: implemented
  description: >
    Core mesh peer implementation. PeerState tracks fingerprint, label, status
    (disconnected/connecting/connected/authenticated), transport, endpoint, latency,
    last seen time, capabilities, and trust level.
  files:
    - web/clawser-mesh-peer.js
  api:
    - PeerState
    - PEER_STATUSES
  category: core
  since: "2.0.0"
  see_also:
    - Mesh Transport
    - Mesh Identity

- name: Mesh Swarm
  status: implemented
  description: >
    Swarm coordination using SWIM protocol for membership management. Supports
    leader-follower, round-robin, load-balanced, redundant, and pipeline task
    strategies. SWIM detects alive/suspect/dead/left member states.
  files:
    - web/clawser-mesh-swarm.js
  api:
    - SwarmMember
    - SwarmRole
    - TaskStrategy
    - SWIM_MEMBER_STATES
  category: coordination
  notes: "Task strategies: leader-follower, round-robin, load-balanced, redundant, pipeline."
  since: "2.0.0"

- name: Mesh DHT
  status: implemented
  description: >
    Distributed hash table with Kademlia-style XOR distance routing. Supports
    store, find-value, find-node, and gossip protocols. Includes stealth shard
    support for private storage.
  files:
    - web/clawser-mesh-dht.js
  api:
    - xorDistance
    - compareDistance
    - highestBitIndex
  category: storage
  notes: "Wire messages: DHT_PING, DHT_FIND_NODE, DHT_FIND_VALUE, DHT_STORE, GOSSIP_PUSH/PULL/DIGEST."
  since: "2.0.0"

- name: Mesh Relay
  status: implemented
  description: >
    Message relay for peers that cannot establish direct connections. MockRelayServer
    provides a testing relay. Production relay uses WebSocket forwarding.
  files:
    - web/clawser-mesh-relay.js
  api:
    - MockRelayServer
  category: transport
  since: "2.0.0"

- name: Mesh Transport
  status: implemented
  description: >
    Transport layer abstraction supporting WebRTC, WSH-WebTransport, and WSH-WebSocket.
    Tracks connection state (disconnected/connecting/connected/closing/closed) and latency.
  files:
    - web/clawser-mesh-transport.js
  api:
    - MeshTransport
    - TRANSPORT_TYPES
    - TRANSPORT_STATES
  category: transport
  notes: "Transport types: webrtc, wsh-wt (WebTransport), wsh-ws (WebSocket)."
  since: "2.0.0"

- name: Mesh Identity
  status: implemented
  description: >
    Ed25519 cryptographic identity system for mesh participants. Each node generates
    a keypair (PodIdentity) for signing and verification. Supports multiple identities,
    labels, DID generation, and in-memory or persistent storage. Vault-encrypted storage
    with PBKDF2 key derivation.
  files:
    - web/clawser-mesh-identity.js
  api:
    - PodIdentity
    - derivePodId
    - InMemoryIdentityStorage
    - encodeBase64url
    - decodeBase64url
  category: identity
  notes: VAULT_PBKDF2_ITERATIONS for key derivation, VAULT_SALT_BYTES and VAULT_IV_BYTES for encryption.
  since: "2.0.0"

- name: Mesh Keyring
  status: implemented
  description: >
    Key management system for mesh cryptographic operations. Manages Ed25519
    signing keys, encryption keys, and group key distribution.
  files:
    - web/clawser-mesh-keyring.js
  api:
    - MeshKeyring
  category: identity
  since: "2.0.0"

- name: Mesh Group Keys
  status: implemented
  description: >
    Group key management for encrypted multi-party communication. Supports
    key rotation and member addition/removal.
  files:
    - web/clawser-mesh-group-keys.js
  api:
    - GroupKeyManager
  category: identity
  since: "2.0.0"

- name: Mesh Trust
  status: implemented
  description: >
    Trust computation system with categories and transitive trust propagation.
    Creates trust edges between peers and computes composite trust scores.
  files:
    - web/clawser-mesh-trust.js
  api:
    - TRUST_CATEGORIES
    - createTrustEdge
    - computeTransitiveTrust
  category: identity
  since: "2.0.0"

- name: Mesh Sync (CRDT)
  status: implemented
  description: >
    CRDT-based state synchronization. Supports 6 CRDT types: LWW-Register,
    G-Counter, PN-Counter, OR-Set, RGA (Replicated Growable Array), and LWW-Map.
    SyncDocument wraps a CRDT with metadata, ACL, and versioning.
  files:
    - web/clawser-mesh-sync.js
  api:
    - SyncDocument
    - CRDT_TYPES
    - CRDT_CONSTRUCTORS
  category: sync
  notes: "CRDT types: lww-register, g-counter, pn-counter, or-set, rga, lww-map."
  since: "2.0.0"

- name: Mesh Delta Sync
  status: implemented
  description: >
    Efficient delta-based synchronization that only transmits changes rather than
    full state. Reduces bandwidth for large synchronized documents.
  files:
    - web/clawser-mesh-delta-sync.js
  api:
    - DeltaSync
  category: sync
  since: "2.0.0"

- name: Mesh Consensus
  status: implemented
  description: >
    Distributed consensus protocol for mesh-wide decisions. Supports simple majority,
    super majority, unanimous, and weighted voting. Proposals have quorum and deadline
    requirements.
  files:
    - web/clawser-mesh-consensus.js
  api:
    - Proposal
    - VoteType
    - generateProposalId
  category: consensus
  notes: "Vote types: SIMPLE, SUPER, UNANIMOUS, WEIGHTED."
  since: "2.0.0"

- name: PBFT Consensus
  status: implemented
  description: >
    Practical Byzantine Fault Tolerance consensus implementation for strongly
    consistent mesh operations.
  files:
    - web/clawser-mesh-consensus.js
  api:
    - pbftConsensus
  category: consensus
  since: "2.0.0"

- name: Mesh Discovery
  status: implemented
  description: >
    Peer and service discovery system. DiscoveryRecord tracks podId, label, endpoint,
    transport, capabilities, metadata, and TTL with expiration. Supports announce,
    query, response, and goodbye messages.
  files:
    - web/clawser-mesh-discovery.js
  api:
    - DiscoveryRecord
  category: discovery
  notes: "Wire messages: DISCOVERY_ANNOUNCE, DISCOVERY_QUERY, DISCOVERY_RESPONSE, DISCOVERY_GOODBYE."
  since: "2.0.0"

- name: Mesh Naming
  status: implemented
  description: >
    Name resolution service for the mesh. Maps human-readable names to peer
    identities and endpoints.
  files:
    - web/clawser-mesh-naming.js
  api:
    - NameResolver
  category: discovery
  since: "2.0.0"

- name: Mesh Handshake
  status: implemented
  description: >
    Secure handshake protocol for establishing authenticated connections between
    mesh peers with capability negotiation.
  files:
    - web/clawser-mesh-handshake.js
  api:
    - HandshakeCoordinator
  category: transport
  since: "2.0.0"

- name: Mesh ACL
  status: implemented
  description: >
    Access Control List engine for mesh resource protection. Supports permissions,
    access grants, scope matching, and default templates (guest, collaborator, admin).
  files:
    - web/clawser-mesh-acl.js
  api:
    - ACLEngine
    - AccessGrant
    - Permission
    - ScopeTemplate
    - DEFAULT_TEMPLATES
    - generateGrantId
    - matchScope
  category: security
  notes: "Default templates: guest (read-only), collaborator (read-write), admin (full)."
  since: "2.0.0"

- name: Mesh Capabilities
  status: implemented
  description: >
    Capability token system for fine-grained access control. Tokens have issuer,
    holder, resource, permissions, constraints, parent chain, expiration, and
    delegation depth limits.
  files:
    - web/clawser-mesh-capabilities.js
  api:
    - CapabilityToken
  category: security
  notes: "Wire messages: CAP_GRANT, CAP_REVOKE, CAP_DELEGATE, WASM_SANDBOX_CTRL."
  since: "2.0.0"

