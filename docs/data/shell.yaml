# Clawser Shell — Virtual shell, builtins, parser, pipes, redirects, globs, variables, OPFS, sessions
# Source of truth for the shell subsystem

- name: Shell Interpreter
  status: implemented
  description: >
    Full shell interpreter running in the browser. Tokenizer, parser, and executor
    with AST-based evaluation. Supports pipes, redirects, command chaining, environment
    variables, glob expansion, brace expansion, command substitution, and variable
    substitution. Approximately 3,376 LOC.
  files:
    - web/clawser-shell.js
    - web/clawser-shell.d.ts
  api:
    - ClawserShell
    - tokenize
    - parse
    - expandVariables
    - expandCommandSubs
    - expandBraces
    - expandGlobs
    - normalizePath
    - execute
  category: interpreter
  notes: >
    AST node types: ShellToken, CommandNode, PipelineNode, ListNode, RedirectInfo.
    Shell state tracks cwd, env vars, aliases, and last exit code.
  since: "1.0.0"
  see_also:
    - Command Registry
    - Terminal Sessions
  screenshot: panel-terminal.png

- name: Command Registry
  status: implemented
  description: >
    All shell builtins are registered with metadata (name, description, usage, flags)
    via CommandRegistry. Powers the Shell Commands panel in Tool Management and shell help.
    Supports registration, lookup, and metadata queries.
  files:
    - web/clawser-shell.js
    - web/clawser-shell.d.ts
  api:
    - CommandRegistry
    - registerBuiltins
    - CommandMeta
    - CommandEntry
  category: registry
  since: "1.0.0"
  see_also:
    - Shell Interpreter

- name: Shell Factory
  status: implemented
  description: >
    Factory function to create fully configured shell instances with all builtins
    registered and OPFS filesystem connected.
  files:
    - web/clawser-shell-factory.js
    - web/clawser-shell-factory.d.ts
  api:
    - createConfiguredShell
  category: factory
  since: "1.0.0"

- name: OPFS Filesystem
  status: implemented
  description: >
    ShellFs and MemoryFs implementations that back the shell's filesystem operations.
    ShellFs wraps the Origin Private File System (OPFS) for persistent storage.
    MemoryFs provides an in-memory filesystem for testing.
  files:
    - web/clawser-shell.js
  api:
    - ShellFs
    - MemoryFs
    - ShellFsLike
  category: filesystem
  since: "1.0.0"

- name: Pipes and Redirects
  status: implemented
  description: >
    Full pipe and redirect support. Pipes (|) connect stdout of one command to stdin
    of the next. Redirects support > (overwrite), >> (append), 2> (stderr), and
    2>&1 (merge stderr into stdout). Logical operators && and || for conditional execution.
  files:
    - web/clawser-shell.js
  api:
    - PipelineNode
    - RedirectInfo
    - StderrRedirectInfo
  category: pipes
  since: "1.0.0"

- name: Variable Substitution
  status: implemented
  description: >
    Shell variable expansion supporting $VAR, ${VAR}, $? (last exit code), and
    environment variable access. Variables are stored in ShellState.
  files:
    - web/clawser-shell.js
  api:
    - expandVariables
    - ShellState
  category: variables
  since: "1.0.0"

- name: Glob Expansion
  status: implemented
  description: >
    Filename glob expansion supporting * (any chars), ? (single char), and [abc]
    (character class) patterns. Expansion happens against the OPFS filesystem.
  files:
    - web/clawser-shell.js
  api:
    - expandGlobs
  category: globs
  since: "1.0.0"

- name: Tab Completion
  status: implemented
  description: >
    Pressing Tab in the terminal panel completes the current word against
    builtin command names (in command position) or directory entries (in path
    position). A second Tab on the same input cycles through multiple matches.
    Smart token-position detection: command vs. path inferred from cursor
    position relative to whitespace.
  files:
    - web/clawser-shell.js
    - web/clawser-ui-panels.js
  api:
    - getCompletions
  category: completion
  since: "1.1.0"

