# ─── CLI NAMESPACE ───────────────────────────────────────────────────

- name: Clawser CLI
  status: implemented
  description: >
    18-subcommand CLI namespace accessible via the 'clawser' shell command. Provides
    agent management, workspace operations, provider configuration, and utility commands.
  files:
    - web/clawser-cli.js
  api:
    - clawser
  category: cli
  notes: >
    Subcommands include agent operations, workspace management, provider switching,
    memory operations, goal management, and system commands.
  since: "1.0.0"

- name: Andbox CLI
  status: implemented
  description: >
    Sandboxed JavaScript runtime CLI accessible via the 'andbox' shell command. Supports
    REPL mode, file execution, virtual module definition, and import maps. Multiple
    security profiles (minimal, web, fs, full, agent).
  files:
    - web/clawser-andbox-cli.js
    - web/clawser-andbox-cli.d.ts
  api:
    - registerAndboxCli
    - ANDBOX_SUBCOMMAND_META
  category: cli
  notes: "Subcommands: run, repl, define, import-map, status, dispose."
  since: "1.5.0"

- name: Scheduler CLI
  status: implemented
  description: >
    Routine/scheduler management CLI accessible via the 'cron' or 'schedule' shell command.
    Supports listing, adding (cron/interval/once), removing, pausing, resuming, and
    force-executing routines.
  files:
    - web/clawser-scheduler-cli.js
  api:
    - registerSchedulerCli
  category: cli
  notes: "Subcommands: list, add, remove, pause, resume, history, run, status."
  since: "1.5.0"

- name: WSH CLI
  status: implemented
  description: >
    Remote shell CLI accessible via the 'wsh' shell command. Provides SSH-like
    remote access with subcommands for connecting, executing, file transfer, and
    PTY management.
  files:
    - web/clawser-wsh-cli.js
    - web/clawser-wsh-cli.d.ts
  api:
    - registerWshCli
    - FLAG_SPEC
    - WSH_SUBCOMMAND_META
  category: cli
  since: "1.5.0"

- name: Terminal Sessions
  status: implemented
  description: >
    First-class terminal session management. Multiple named sessions with history,
    fork, rename, replay, and export (script, markdown, JSON). Session state persisted
    per-workspace via terminal session store.
  files:
    - web/clawser-shell.js
    - web/clawser-terminal-session-store.js
    - web/clawser-item-bar.js
  api:
    - terminalSessions
    - renderTerminalSessionBar
    - replayTerminalSession
  category: sessions
  since: "1.0.0"
  screenshot: 22-terminal-sessions.png

# ─── PHASE 6: CLSH SHELL LANGUAGE ────────────────────────────────────

- name: If/Else/Fi Conditionals
  status: implemented
  description: >
    Full if/then/elif/else/fi conditional syntax in the shell language. Supports
    nested conditionals, test expressions, and compound conditions with && and ||.
    Multi-line input detected via isIncomplete() for interactive entry.
  files:
    - web/clawser-shell.js
  category: shell-language
  since: "2.1.0"
  see_also:
    - Shell Interpreter

- name: While/For Loops
  status: implemented
  description: >
    Loop constructs: while/do/done and for/in/do/done. While loops evaluate a
    condition each iteration. For loops iterate over word lists with variable
    binding. Both support break and continue. Nested loops supported.
  files:
    - web/clawser-shell.js
  category: shell-language
  since: "2.1.0"
  see_also:
    - Shell Interpreter

- name: Function Definitions
  status: implemented
  description: >
    Shell function definitions via fn() { body } syntax. Functions are stored in
    ShellState and invoked as regular commands. Supports positional parameters,
    local variables, and return values within function scope.
  files:
    - web/clawser-shell.js
  category: shell-language
  since: "2.1.0"
  see_also:
    - Shell Interpreter

- name: Source Builtin and Profile System
  status: implemented
  description: >
    The source (.) builtin executes shell scripts in the current environment.
    Powers the profile system: /etc/clawser/profile runs on shell init for
    global defaults, ~/.clshrc runs per-user customizations. Enables reusable
    shell libraries and configuration scripts.
  files:
    - web/clawser-shell.js
    - web/clawser-fs-bootstrap.mjs
  category: shell-language
  since: "2.1.0"
  see_also:
    - Shell Interpreter

- name: Positional Parameters
  status: implemented
  description: >
    Positional parameter expansion for shell functions and sourced scripts.
    Supports $1 through $9 for individual arguments, $@ for all arguments
    as separate words, and $# for the argument count.
  files:
    - web/clawser-shell.js
  category: shell-language
  since: "2.1.0"
  see_also:
    - Function Definitions
    - Variable Substitution

- name: "local"
  status: implemented
  description: >
    Declare function-local variables that do not leak into the parent scope.
    Restores previous values on function return.
  files:
    - web/clawser-shell.js
  category: builtin-scripting
  since: "2.1.0"

- name: "return"
  status: implemented
  description: >
    Return from a shell function with an optional exit code. Sets $? to the
    specified value (default 0).
  files:
    - web/clawser-shell.js
  category: builtin-scripting
  since: "2.1.0"

- name: Clsh Identity
  status: implemented
  description: >
    The shell identifies itself as clsh (Clawser Shell). $SHELL is set to "clsh"
    and $CLSH_VERSION reports the current version. Distinguishes clawser's shell
    from bash/zsh in scripts and profile conditionals.
  files:
    - web/clawser-shell.js
  category: shell-language
  since: "2.1.0"
