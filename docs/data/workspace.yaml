# Clawser Workspace — Workspaces, persistence, conversations, vault, migration
# Source of truth for the workspace and persistence subsystem

- name: Workspace Management
  status: implemented
  description: >
    Multi-workspace system with isolated state per workspace. Each workspace has
    its own memory, goals, skills, configurations, conversations, and tool permissions.
    Workspaces persisted to localStorage with LRU timestamps. OPFS directories
    per workspace at clawser_workspaces/{wsId}/.
  files:
    - web/clawser-workspaces.js
    - web/clawser-workspaces.d.ts
  api:
    - loadWorkspaces
    - saveWorkspaces
    - getActiveWorkspaceId
    - setActiveWorkspaceId
    - ensureDefaultWorkspace
    - createWorkspace
    - renameWorkspace
    - deleteWorkspace
    - getWorkspaceName
    - touchWorkspace
    - WS_KEY
    - WS_ACTIVE_KEY
  category: workspaces
  since: "1.0.0"
  see_also:
    - Workspace Lifecycle

- name: Workspace Lifecycle
  status: implemented
  description: >
    Workspace initialization, switching, and teardown. Sets up kernel integration,
    creates shell sessions, and restores state on workspace switch.
  files:
    - web/clawser-workspace-lifecycle.js
    - web/clawser-workspace-lifecycle.d.ts
    - web/clawser-workspace-init-ui.js
    - web/clawser-workspace-init-tools.js
    - web/clawser-workspace-init-mesh.js
  api:
    - switchWorkspace
    - initWorkspace
    - createShellSession
    - setKernelIntegration
    - getKernelIntegration
  category: lifecycle
  since: "1.0.0"

- name: OPFS Persistence
  status: implemented
  description: >
    Primary persistence layer using the Origin Private File System. Stores event logs
    (JSONL), memory state, skill files, conversation data, and checkpoints. Per-workspace
    directories with isolated storage.
  files:
    - web/clawser-agent.js
  api:
    - persistCheckpoint
    - restoreCheckpoint
    - persistConversation
    - restoreConversation
    - persistMemories
    - restoreMemories
    - persistConfig
    - restoreConfig
  category: persistence
  notes: >
    OPFS directories: clawser_skills/ (global), clawser_workspaces/{wsId}/ (per-workspace).
    Performance target: less than 100ms startup.
  since: "1.0.0"

- name: localStorage Persistence
  status: implemented
  description: >
    Secondary persistence for workspace list, active workspace ID, tool permissions,
    conversation metadata, and application configuration. Faster than OPFS for
    small key-value data.
  files:
    - web/clawser-workspaces.js
    - web/clawser-state.js
  api:
    - loadWorkspaces
    - saveWorkspaces
  category: persistence
  since: "1.0.0"

- name: IndexedDB Persistence
  status: implemented
  description: >
    Tertiary persistence for checkpoint indexing, server route definitions,
    and terminal session state. Used when structured queries are needed.
  files:
    - web/clawser-checkpoint-idb.js
    - web/clawser-terminal-session-store.js
  api:
    - CheckpointIDB
    - TerminalSessionStore
  category: persistence
  since: "1.5.0"

- name: Conversations
  status: implemented
  description: >
    Conversation management with create, load, switch, fork, replay, and export.
    Conversations are event-sourced via the EventLog. Metadata (id, name, created,
    lastUsed) stored per-workspace. Full JSONL serialization for portability.
  files:
    - web/clawser-conversations.js
    - web/clawser-conversations.d.ts
  api:
    - loadConversations
    - updateConversationMeta
    - generateConvId
    - ConversationMeta
  category: conversations
  since: "1.0.0"

- name: Checkpoint/Restore
  status: implemented
  description: >
    Binary checkpoint format for full agent state serialization. Checkpoint captures
    conversation history, memory state, goal state, scheduler jobs, and configuration.
    Three-level fallback hierarchy: v2 directory-based, v1 file-based, localStorage.
  files:
    - web/clawser-agent.js
    - web/clawser-daemon.js
  api:
    - checkpoint
    - restore
    - getCheckpointJSON
  category: checkpoint
  notes: Performance target under 64MB memory usage.
  since: "1.0.0"
  see_also:
    - CheckpointManager

- name: Filesystem Mounting
  status: implemented
  description: >
    Mount local filesystem directories into the agent's OPFS namespace using the
    File System Access API. Supports persisting mount handles across sessions,
    directory picking, and file picking.
  files:
    - web/clawser-mount.js
    - web/clawser-mount.d.ts
  api:
    - MountableFs
    - persistHandle
    - restoreHandle
    - removePersistedHandle
    - listPersistedMounts
    - isFileSystemAccessSupported
    - pickDirectory
    - pickFile
    - MountListTool
    - MountResolveTool
  category: mount
  since: "1.0.0"

- name: Filesystem Observer
  status: implemented
  description: >
    Watches for changes in mounted filesystem directories and triggers events
    when files are created, modified, or deleted.
  files:
    - web/clawser-fs-observer.js
  api:
    - FsObserver
  category: observer
  since: "1.5.0"

# ─── UNIX FILESYSTEM ARCHITECTURE ─────────────────────────────────────

- name: Unix Filesystem Architecture
  status: implemented
  description: >
    Ten-phase Unix filesystem architecture (Phases 0–9) layered on top of OPFS.
    Canonical directory tree with /etc, /var, /run, /dev, /proc, /home, /tmp, and
    /mnt namespaces. First-boot bootstrap creates the full hierarchy and writes
    default config files. Provides the foundation for config reactivity, device
    files, virtual filesystems, and the profile system.
  files:
    - web/clawser-fs-bootstrap.mjs
  api:
    - GLOBAL_DIRS
    - PER_WS_DIRS
    - DEFAULT_FILES
    - bootstrapFilesystem
  category: filesystem
  notes: >
    Phase 0 (OPFS adapter rewrite), Phase 1 (filesystem layout + bootstrap),
    Phase 2 (config file reactivity), Phase 3 (/proc and /run), Phase 4
    (chmod support), Phase 5 (device files), Phase 6 (shell profile + .env
    loading), Phase 7 (UI ↔ file sync via FsUiSync), Phase 8 (kernel
    filesystem integration), Phase 9 (v86 guest mount points).
  since: "2.1.0"
  see_also:
    - OPFS Persistence

- name: Config File Reactivity
  status: implemented
  description: >
    Reactive config store backed by OPFS file watching. FileWatcher polls for
    changes to config files; ReactiveConfigStore provides subscribe/unsubscribe
    API with validation and apply callbacks. Editing a config file in the shell
    automatically propagates changes to the running agent. Uses Web Locks for
    safe concurrent writes.
  files:
    - web/clawser-reactive-config.mjs
  api:
    - ReactiveConfigStore
    - FileWatcher
  category: filesystem
  notes: >
    Phase 1 of Unix filesystem architecture. Watches files like
    ~/.config/clawser/autonomy.json and applies changes in real time.
  since: "2.1.0"
  see_also:
    - Unix Filesystem Architecture

- name: /proc Virtual Filesystem
  status: implemented
  description: >
    Read-only virtual filesystem at /proc/clawser/ that exposes live runtime
    state as files. Includes agent status, memory stats, active goals, provider
    info, mesh peers, and kernel tenant data. Files are generated on read from
    current application state.
  files:
    - web/clawser-proc.js
  api:
    - ProcFileHandler
    - registerProcGenerators
    - VirtualFs
  category: filesystem
  notes: >
    Phase 2 of Unix filesystem architecture. cat /proc/clawser/status returns
    live agent state as JSON. `/proc/clawser/workspaces` lists every
    workspace's id, name, resolved `/home/<name>` path, and active marker —
    see Shell's "Workspace Home" entry for the naming rules.
  since: "2.1.0"

- name: /run Virtual Filesystem
  status: implemented
  description: >
    Runtime state directory at /run/clawser/ for ephemeral data that does not
    survive restarts. Stores PID files, tab registration, active lock files,
    and transient session data. Cleared on bootstrap.
  files:
    - web/clawser-fs-bootstrap.mjs
  category: filesystem
  notes: Phase 3 of Unix filesystem architecture.
  since: "2.1.0"

- name: Chmod Permissions Layer
  status: implemented
  description: >
    Virtual Unix-like permission system for the clawser filesystem. Stores
    owner-mode permissions (read/write/execute) in a manifest persisted to OPFS.
    chmod builtin sets permissions; ls -l displays them. Enforced on file
    operations via PermissionManager.
  files:
    - web/clawser-permissions.js
  api:
    - PermissionManager
    - checkPermission
    - setPermission
  category: filesystem
  notes: >
    Phase 4 of Unix filesystem architecture. Numeric modes simplified to
    owner-only (e.g. 644 → rw-).
  since: "2.1.0"

- name: Device Files
  status: implemented
  description: >
    Read/write device file layer at /dev/clawser/. Writing to a device triggers
    an action; reading returns the result. Sub-trees for providers
    (/dev/clawser/providers/), channels (/dev/clawser/channels/), hardware
    (/dev/clawser/hardware/), and mesh peers (/dev/clawser/mesh/peers/).
    Plus special devices: /dev/clawser/null, /random, /zero.
  files:
    - web/clawser-fs-devices.mjs
    - web/clawser-runtime.js
  api:
    - DeviceFileHandler
    - registerProviderDevice
    - registerChannelDevice
    - registerHardwareDevice
    - registerMeshPeerDevice
    - unregisterMeshPeerDevice
    - registerSpecialDevices
    - addMeshPeerDevice
    - removeMeshPeerDevice
  category: filesystem
  notes: >
    Phase 5 of Unix filesystem architecture. echo "hello" > /dev/clawser/channels/slack
    sends a message via the Slack channel adapter.
  since: "2.1.0"

- name: Mesh Peer Device Files
  status: implemented
  description: >
    Per-peer device files at /dev/clawser/mesh/peers/{peerId}. Read returns peer
    metadata as JSON ({podId, status, lastSeen, capabilities, peerType, lastMessage}).
    Write parses a JSON envelope ({type, payload, timeout?}) and dispatches via
    pod.sendMessage(peerId, envelope), which routes through PeerNode.sendTo using
    the peer's currently active transport session. Devices register/unregister
    automatically on discovery events.
  files:
    - web/clawser-fs-devices.mjs
    - web/clawser-workspace-init-mesh.js
    - web/clawser-pod.js
    - web/clawser-peer-node.js
  api:
    - registerMeshPeerDevice
    - unregisterMeshPeerDevice
    - sendMessage
    - sendTo
    - hasActiveSession
  category: filesystem
  notes: >
    UFS §2.7. Documented envelope shape passes type verbatim; unknown types
    are forwarded to the peer for opt-in handling. Throws "no active session"
    if the peer hasn't been connected.
  since: "2.1.0"
  see_also:
    - Device Files

- name: .env File Loading
  status: implemented
  description: >
    Automatic loading of .env files from the workspace root into shell environment
    variables on workspace init. Supports comments and KEY=VALUE syntax.
  files:
    - web/clawser-fs-bootstrap.mjs
  category: filesystem
  notes: Phase 7 of Unix filesystem architecture.
  since: "2.1.0"

- name: Motd and Profile Scripts
  status: implemented
  description: >
    Message of the day (/etc/clawser/motd) displayed on shell startup.
    Profile scripts (/etc/clawser/profile and ~/.clshrc) sourced on shell init
    for setting aliases, environment variables, and custom functions.
  files:
    - web/clawser-fs-bootstrap.mjs
    - web/clawser-shell.js
  category: filesystem
  notes: Phase 8 of Unix filesystem architecture.
  since: "2.1.0"
  see_also:
    - Source Builtin and Profile System

- name: Web Locks for OPFS Concurrency
  status: implemented
  description: >
    Uses the Web Locks API to coordinate concurrent OPFS access across tabs
    and workers. Prevents data corruption from simultaneous writes to config
    files, event logs, and checkpoint data.
  files:
    - web/clawser-reactive-config.mjs
    - web/clawser-fs-bootstrap.mjs
  category: filesystem
  notes: Integrated into ReactiveConfigStore and bootstrap writes.
  since: "2.1.0"

- name: Disposable Mode
  status: implemented
  description: >
    Ephemeral workspace mode where nothing persists after tab close. No OPFS writes,
    no localStorage, no IndexedDB. For demos, sensitive work, or guest access.
  files:
    - web/clawser-fs-bootstrap.mjs
  category: workspaces
  notes: >
    Inspired by Linux on Tab's 'close tab, everything gone' privacy model.
  since: "2.1.0"

- name: Atomic Workspace Snapshots
  status: implemented
  description: >
    Save and restore the complete workspace state (event log, checkpoint, memories,
    routines, shell state, skill activations, hooks, localStorage settings) as a
    single atomic snapshot. Two backends: tar-on-OPFS (default) writes USTAR
    archives to ~/.local/share/clawser/snapshots/{id}.tar; legacy IndexedDB
    backend retained for one release for backward compatibility. Top-level shell
    commands: snapshot save/restore/list/delete/info.
  files:
    - web/clawser-snapshots.js
    - web/clawser-snapshot-cli.js
    - web/clawser-tar.mjs
  api:
    - SnapshotManager
    - createTarSnapshot
    - restoreTarSnapshot
    - listTarSnapshots
    - deleteTarSnapshot
    - createAtomicSnapshot
    - restoreAtomicSnapshot
    - listSnapshots
    - deleteSnapshot
  category: checkpoint
  notes: >
    Each subsystem becomes one tar entry; meta.json is the self-describing header.
    snapshot list merges OPFS-tar and legacy-IDB sources.
  since: "2.1.0"

- name: USTAR Tar Format
  status: implemented
  description: >
    Pure-JS POSIX USTAR tar writer/reader. Used by the snapshot system and
    available for any future export/import flow. Round-trips files with
    arbitrary content sizes, UTF-8, mtime, mode, and prefix splitting for
    long names (up to 255 bytes). Validates checksums on read.
  files:
    - web/clawser-tar.mjs
  api:
    - writeTar
    - readTar
    - writeTarFromObject
    - readTarToObject
  category: filesystem
  since: "2.1.0"
  see_also:
    - Atomic Workspace Snapshots
