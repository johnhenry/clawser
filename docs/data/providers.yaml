# Clawser Providers — All LLM providers, models, capabilities, and configuration
# Source of truth for the provider subsystem

- name: Provider Registry
  status: implemented
  description: >
    Pluggable provider architecture with register/get/remove semantics. ProviderRegistry
    manages all provider instances and exposes availability checking. Three-tier system
    allows mixing built-in, OpenAI-compatible, and CDN-loaded providers.
  files:
    - web/clawser-providers.js
    - web/clawser-providers.d.ts
  api:
    - ProviderRegistry
    - ProviderRegistry.register
    - ProviderRegistry.get
    - ProviderRegistry.has
    - ProviderRegistry.names
    - ProviderRegistry.remove
    - ProviderRegistry.listWithAvailability
    - createDefaultProviders
  category: registry
  since: "1.0.0"
  see_also:
    - LLMProvider Base Class

- name: LLMProvider Base Class
  status: implemented
  description: >
    Abstract base class for all LLM providers. Defines the common interface: chat() for
    single-shot completions, chatStream() for async generator streaming, and metadata
    properties (name, displayName, requiresApiKey, supportsStreaming, supportsNativeTools).
  files:
    - web/clawser-providers.js
    - web/clawser-providers.d.ts
  api:
    - LLMProvider
    - LLMProvider.chat
    - LLMProvider.chatStream
    - LLMProvider.isAvailable
    - LLMProvider.name
    - LLMProvider.displayName
    - LLMProvider.requiresApiKey
    - LLMProvider.supportsStreaming
    - LLMProvider.supportsNativeTools
  category: base
  since: "1.0.0"

- name: EchoProvider
  status: implemented
  description: >
    Testing provider that echoes back user messages. Does not require an API key.
    Useful for development and debugging without consuming API credits.
  files:
    - web/clawser-providers.js
  api:
    - EchoProvider
  category: tier-1-builtin
  notes: "Capabilities: streaming (yes), vision (no), tool_calls (no). No API key required."
  since: "1.0.0"

- name: ChromeAIProvider
  status: implemented
  description: >
    Chrome built-in AI provider using Gemini Nano. Runs entirely on-device via
    Chrome's AI APIs. Supports streaming. No API key required but requires
    Chrome with AI features enabled.
  files:
    - web/clawser-providers.js
  api:
    - ChromeAIProvider
  category: tier-1-builtin
  notes: "Capabilities: streaming (yes), vision (no), tool_calls (no). Requires Chrome 127+ with AI features."
  since: "1.0.0"

- name: OpenAIProvider
  status: implemented
  description: >
    OpenAI API provider supporting GPT-4, GPT-4o, GPT-3.5-turbo, and other OpenAI models.
    Full support for streaming via SSE, native tool use, and vision (multimodal input).
  files:
    - web/clawser-providers.js
  api:
    - OpenAIProvider
    - readSSE
  category: tier-1-builtin
  notes: "Capabilities: streaming (yes), vision (yes for GPT-4o/V), tool_calls (yes). Models: gpt-4, gpt-4o, gpt-4-turbo, gpt-3.5-turbo, o1, o1-mini."
  since: "1.0.0"

- name: AnthropicProvider
  status: implemented
  description: >
    Anthropic Claude API provider supporting Claude 3.5 Sonnet, Claude 3 Opus/Haiku,
    and newer models. Full support for streaming via Anthropic SSE format, native tool use,
    and vision (multimodal input).
  files:
    - web/clawser-providers.js
  api:
    - AnthropicProvider
    - readAnthropicSSE
  category: tier-1-builtin
  notes: "Capabilities: streaming (yes), vision (yes), tool_calls (yes). Models: claude-3.5-sonnet, claude-3-opus, claude-3-haiku, claude-3-sonnet."
  since: "1.0.0"

- name: OpenAICompatibleProvider
  status: implemented
  description: >
    Generic provider for any OpenAI-compatible API endpoint. Used as the base for
    Tier 2 providers. Configurable base URL, model list, and capabilities.
  files:
    - web/clawser-providers.js
  api:
    - OpenAICompatibleProvider
    - OPENAI_COMPATIBLE_SERVICES
  category: tier-2-compatible
  notes: >
    OPENAI_COMPATIBLE_SERVICES defines pre-configured endpoints for: Groq, OpenRouter,
    Together AI, Fireworks, Mistral, DeepSeek, xAI (Grok), Perplexity, Ollama, LM Studio,
    Lepton, and others. Each has base URL, default models, and capability flags.
  since: "1.0.0"

