- name: MateyProvider (ai.matey Tier 3)
  status: implemented
  description: >
    Dynamic CDN-lazy-loaded provider backend via the ai.matey package. Supports 24+
    additional providers loaded on demand to minimize initial bundle size. Each backend
    is instantiated only when first used.
  files:
    - web/clawser-providers.js
  api:
    - MateyProvider
  category: tier-3-matey
  notes: >
    24+ providers available via CDN lazy loading. Instantiated on first use.
    Cost-efficient approach — only loads code for providers actually in use.
  since: "1.5.0"

- name: SSE Streaming
  status: implemented
  description: >
    Server-Sent Events streaming parsers for both OpenAI and Anthropic formats.
    readSSE() handles OpenAI-style streaming, readAnthropicSSE() handles Anthropic's
    message streaming format. Both return async generators.
  files:
    - web/clawser-providers.js
  api:
    - readSSE
    - readAnthropicSSE
  category: streaming
  since: "1.0.0"
  see_also:
    - OpenAIProvider
    - AnthropicProvider

- name: Vision / Multimodal Input
  status: implemented
  description: >
    Support for multimodal input (images + text) when using providers that support vision
    (GPT-4o, GPT-4V, Claude 3, etc). Images are sent as content array items with base64
    or URL references.
  files:
    - web/clawser-providers.js
    - web/types.d.ts
  api:
    - ChatMessage
  category: multimodal
  notes: Supported by OpenAI (GPT-4o/V), Anthropic (Claude 3), and select Tier 2 providers.
  since: "1.0.0"

- name: Account Management
  status: implemented
  description: >
    Multi-account system for managing API keys and provider configurations. Supports
    creating, updating, and deleting accounts with encrypted key storage via the vault.
    Built-in accounts provide defaults. Migration utility moves keys from localStorage to vault.
  files:
    - web/clawser-accounts.js
    - web/clawser-accounts.d.ts
  api:
    - SERVICES
    - BUILTIN_ACCOUNTS
    - loadAccounts
    - saveAccounts
    - createAccount
    - updateAccount
    - deleteAccount
    - storeAccountKey
    - resolveAccountKey
    - migrateKeysToVault
    - seedBuiltinAccounts
  category: accounts
  since: "1.0.0"
  see_also:
    - Auth Profiles
    - Vault
