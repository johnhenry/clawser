- name: Undo/Redo System
  status: implemented
  description: >
    Turn-based undo/redo with checkpoint snapshots. Each turn captures history length,
    memory operations, file operations, and goal operations. Supports preview before
    reverting and full redo capability. Handlers manage revert/restore/apply across
    memory, file, and goal layers.
  files:
    - web/clawser-undo.js
    - web/clawser-undo.d.ts
  api:
    - UndoManager
    - TurnCheckpoint
    - UndoTool
    - UndoStatusTool
    - RedoTool
  category: undo
  notes: Tool names are undo, undo_status, and redo.
  since: "1.5.0"
  see_also:
    - ClawserAgent

- name: Goal System
  status: implemented
  description: >
    Hierarchical goal tracking with decomposition, artifacts, dependencies, and cascading
    completion. Goals have priority levels (low/medium/high/critical), status tracking
    (active/paused/completed/failed), progress logging, and markdown import/export.
    Completion callbacks fire when goals finish.
  files:
    - web/clawser-goals.js
    - web/clawser-goals.d.ts
  api:
    - GoalManager
    - GoalManager.addGoal
    - GoalManager.updateStatus
    - GoalManager.addSubGoal
    - GoalManager.decompose
    - GoalManager.addArtifact
    - GoalManager.removeArtifact
    - GoalManager.logProgress
    - GoalManager.progress
    - GoalManager.addDependency
    - GoalManager.isBlocked
    - GoalManager.toMarkdown
    - GoalManager.fromMarkdown
    - Goal
    - GoalAddTool
    - GoalUpdateTool
    - GoalListTool
    - GoalRemoveTool
    - GoalDecomposeTool
    - GoalAddArtifactTool
    - GoalRemoveArtifactTool
  category: goals
  notes: 7 tools covering goal_add, goal_update, goal_list, goal_remove, goal_decompose, goal_add_artifact, goal_remove_artifact.
  since: "1.0.0"
  see_also:
    - ClawserAgent

