# Clawser Core — Agent engine, event log, hooks, autonomy, context, caching, cost, errors, identity
# Source of truth for the core agent subsystem

- name: ClawserAgent
  status: implemented
  description: >
    Main agent orchestrator class. Manages the decide-execute run loop (up to 20 tool iterations),
    coordinates providers, tools, memory, goals, scheduler, hooks, autonomy, and persistence.
    Supports streaming via async generators, pause/resume, context compaction, checkpoint/restore,
    and workspace isolation. Created via static factory method ClawserAgent.create().
  files:
    - web/clawser-agent.js
    - web/clawser-agent.d.ts
  api:
    - ClawserAgent.create
    - ClawserAgent.estimateTokens
    - ClawserAgent.parseCron
    - init
    - reinit
    - run
    - runStream
    - sendMessage
    - pauseAgent
    - resumeAgent
    - setProvider
    - setApiKey
    - setModel
    - getModel
    - setSystemPrompt
    - setMaxToolIterations
    - getProviders
    - applyAgent
    - applyAutonomyConfig
    - setFallbackExecutor
    - registerToolSpec
    - unregisterToolSpec
    - refreshToolSpecs
    - executeToolDirect
    - isToolExternal
    - getCodexPrompt
    - getState
    - getCheckpointJSON
    - setWorkspace
    - getWorkspace
  category: agent-engine
  notes: >
    The run loop calls the LLM, processes tool calls, and iterates until the model produces
    a final text response or hits the max iteration limit. Parallel execution is supported
    for read-only tools. Performance target is less than 100ms per tool execution.
  since: "1.0.0"
  see_also:
    - EventLog
    - HookPipeline
    - AutonomyController
    - Context Compaction

- name: EventLog
  status: implemented
  description: >
    Append-only JSONL event store that records every agent lifecycle event. Supports 18+ event
    types including user_message, agent_message, tool_call, tool_result, error, autonomy_blocked,
    cache_hit, context_compacted, memory operations, goal changes, scheduler events, safety events,
    and provider errors. Provides query, summary, JSONL serialization, and session history derivation.
  files:
    - web/clawser-agent.js
    - web/clawser-agent.d.ts
  api:
    - EventLog
    - append
    - query
    - summary
    - events
    - size
    - clear
    - load
    - toJSONL
    - EventLog.fromJSONL
    - deriveSessionHistory
  category: event-sourcing
  notes: >
    Event types: user_message, agent_message, tool_call, tool_result, tool_result_truncated,
    error, autonomy_blocked, cache_hit, context_compacted, memory_stored, memory_forgotten,
    goal_added, goal_updated, scheduler_added, scheduler_fired, scheduler_removed,
    safety_input_flag, safety_tool_blocked, safety_output_blocked, safety_output_redacted,
    provider_error, stream_error.
  since: "1.0.0"
  see_also:
    - ClawserAgent

- name: HookPipeline
  status: implemented
  description: >
    Lifecycle interception system with 6 hook points. Hooks can transform, block, or audit
    messages and tool calls at each stage of the agent pipeline. Supports registration,
    enable/disable toggling, and ordered execution. Includes a built-in audit logger hook factory.
  files:
    - web/clawser-agent.js
    - web/clawser-agent.d.ts
  api:
    - HookPipeline
    - register
    - unregister
    - setEnabled
    - run
    - list
    - clearAll
    - size
    - createAuditLoggerHook
    - HOOK_POINTS
  category: hooks
  notes: >
    Hook points: beforeInbound, beforeToolCall, beforeOutbound, transformResponse,
    onSessionStart, onSessionEnd. Each hook receives a context object and can modify
    or block execution by returning block true.
  since: "1.0.0"
  see_also:
    - ClawserAgent
    - SafetyPipeline

- name: AutonomyController
  status: implemented
  description: >
    Capability boundary and rate-limiting engine. Enforces three autonomy levels
    (readonly, supervised, full), action-per-hour limits, cost-per-day caps,
    allowed operating hours, and integrates with the PolicyEngine for fine-grained
    tool-level decisions. Records actions and costs for stats tracking.
  files:
    - web/clawser-agent.js
    - web/clawser-agent.d.ts
  api:
    - AutonomyController
    - level
    - maxActionsPerHour
    - maxCostPerDayCents
    - allowedHours
    - setPolicyEngine
    - policyEngine
    - canExecuteTool
    - needsApproval
    - checkLimits
    - recordAction
    - recordCost
    - stats
    - reset
  category: autonomy
  notes: >
    Three levels: readonly (no tool execution), supervised (approval required for
    approve-level tools), full (all tools auto-approved). Rate limits and cost caps
    are enforced independently of the level.
  since: "1.0.0"
  see_also:
    - PolicyEngine
    - SafetyPipeline
    - Autonomy Presets

- name: Autonomy Presets
  status: implemented
  description: >
    Pre-configured autonomy profiles that bundle level, rate limits, cost caps, and
    allowed hours into named presets for quick configuration.
  files:
    - web/clawser-autonomy-presets.js
  api:
    - autonomyPresets
  category: autonomy
  since: "1.5.0"
  see_also:
    - AutonomyController

- name: Context Compaction
  status: implemented
  description: >
    Automatic and manual context window management. When conversation history exceeds
    approximately 12K tokens, the agent summarizes older messages to reclaim context space.
    Supports configurable thresholds and emits context_compacted events to the EventLog.
    Also includes session idle timeout with automatic compaction.
  files:
    - web/clawser-agent.js
    - web/clawser-agent.d.ts
  api:
    - compactContext
    - estimateHistoryTokens
    - truncateHistory
  category: context-management
  notes: Auto-triggers at approximately 12K tokens. Target compaction time under 2 seconds.
  since: "1.0.0"
  see_also:
    - ClawserAgent
    - Response Caching

- name: Response Caching
  status: implemented
  description: >
    LRU response cache with 500-entry capacity and 30-minute TTL. Uses FNV-1a hashing
    to create cache keys from message history and model name. Prevents redundant LLM calls
    for identical conversation states. Emits cache_hit events.
  files:
    - web/clawser-providers.js
    - web/clawser-providers.d.ts
  api:
    - ResponseCache
    - ResponseCache.hash
    - ResponseCache.cacheKey
    - get
    - set
    - delete
    - clear
    - enabled
    - ttl
    - maxEntries
    - size
    - stats
  category: caching
  notes: FNV-1a hashing for cache keys. Default 500 entries, 30-min TTL. Per-workspace, resets on switch.
  since: "1.0.0"
  see_also:
    - Cost Tracking
    - Context Compaction

- name: Cost Tracking
  status: implemented
  description: >
    Per-token cost tracking with model-specific pricing tables. CostLedger records every
    LLM call cost grouped by model and provider with configurable USD thresholds.
    ProfileCostLedger extends this for multi-profile cost isolation. CostTracker provides
    rolling 30-day window with daily totals, hourly buckets, and per-model breakdowns.
  files:
    - web/clawser-providers.js
    - web/clawser-providers.d.ts
    - web/clawser-cost-tracker.js
    - web/clawser-cost-events.js
  api:
    - CostLedger
    - CostLedger.record
    - CostLedger.totalByModel
    - CostLedger.totalByProvider
    - CostLedger.summary
    - CostLedger.isOverThreshold
    - CostLedger.setThreshold
    - ProfileCostLedger
    - ProfileCostLedger.profileSummary
    - ProfileCostLedger.setProfileThreshold
    - ProfileCostLedger.isProfileOverThreshold
    - CostTracker
    - CostTracker.recordCost
    - CostTracker.getDailyTotals
    - CostTracker.getPerModelBreakdown
    - CostTracker.getHourlyBuckets
    - CostTracker.getTotalCost
    - estimateCost
    - MODEL_PRICING
    - getCostTracker
    - recordCostEvent
  category: cost-management
  notes: >
    MODEL_PRICING contains per-token input/output prices for all known models.
    CostTracker uses a 30-day rolling window with 10K record cap.
    Cost caps enforced — agent refuses to run when daily cap is reached.
  since: "1.0.0"
  see_also:
    - Response Caching
    - AutonomyController

- name: Error Classification
  status: implemented
  description: >
    Classifies provider errors into 9 categories with retryability flags: auth, rate_limit,
    context_length, invalid_request, server_error, network, timeout, content_filter, and unknown.
    Used by the fallback chain and self-repair engine to determine recovery strategies.
  files:
    - web/clawser-providers.js
    - web/clawser-providers.d.ts
  api:
    - classifyError
    - validateChatResponse
  category: error-handling
  notes: >
    9 error categories: auth, rate_limit, context_length, invalid_request, server_error,
    network, timeout, content_filter, unknown. Each has a retryable boolean flag.
  since: "1.0.0"
  see_also:
    - Fallback Chain
    - Self-Repair Engine

- name: Identity Compilation
  status: implemented
  description: >
    System prompt compilation from identity definitions. Supports three formats: plain text,
    AIEOS (structured personality with psychology, linguistics, motivations, capabilities, history),
    and OpenClaw. The IdentityManager loads, validates, and compiles identities into system prompts
    with template variable injection.
  files:
    - web/clawser-identity.js
    - web/clawser-identity.d.ts
  api:
    - IdentityManager
    - IdentityManager.load
    - IdentityManager.compile
    - IdentityManager.reset
    - IdentityManager.fromJSON
    - compileSystemPrompt
    - detectIdentityFormat
    - validateAIEOS
    - DEFAULT_IDENTITY
  category: identity
  notes: >
    AIEOS identity format includes: version, names (display/full/aliases), bio,
    psychology (MBTI, OCEAN, moral compass, neural matrix), linguistics (formality,
    verbosity, catchphrases, forbidden words, vocabulary level, tone), motivations
    (core drive, goals, fears), capabilities (skills, tools, knowledge domains),
    physicality (avatar), and history.
  since: "1.5.0"
  see_also:
    - ClawserAgent
    - Named Agents

- name: Intent Router
  status: implemented
  description: >
    Message classification engine that routes user messages into intent categories
    (COMMAND, QUERY, TASK, CHAT, SYSTEM) with per-intent pipeline configuration controlling
    memory usage, tool access, LLM model hints, and token limits. Supports custom patterns,
    prefix overrides, and LLM-assisted classification for ambiguous cases.
  files:
    - web/clawser-intent.js
    - web/clawser-intent.d.ts
  api:
    - IntentRouter
    - IntentRouter.classify
    - IntentRouter.route
    - IntentRouter.getPipelineConfig
    - IntentRouter.addPattern
    - IntentRouter.addOverride
    - MessageIntent
    - PIPELINE_CONFIG
    - classifyWithLLM
    - IntentClassifyTool
    - IntentOverrideTool
  category: routing
  notes: >
    Pipeline config per intent controls: useMemory, useTools, useLLM, modelHint,
    maxTokens, useGoals, skipUI.
  since: "1.5.0"
  see_also:
    - ClawserAgent

- name: Fallback Chain
  status: implemented
  description: >
    Model fallback and routing system. Maintains a prioritized chain of provider/model
    pairs with health tracking, backoff, and cost-aware sorting. FallbackExecutor wraps
    the chain for automatic failover. ModelRouter adds intent-based model selection.
    ProviderHealth tracks per-provider availability.
  files:
    - web/clawser-fallback.js
    - web/clawser-fallback.d.ts
  api:
    - FallbackChain
    - FallbackExecutor
    - ProviderHealth
    - ModelRouter
    - createFallbackEntry
    - backoff
    - costAwareSort
    - HINT_MODELS
  category: reliability
  notes: MAX_DELEGATION_DEPTH limits nested fallback. HINT_MODELS maps intent categories to recommended models.
  since: "1.5.0"
  see_also:
    - Error Classification
    - ClawserAgent

- name: Codex
  status: implemented
  description: >
    Code execution engine that extracts code blocks from LLM responses and runs them
    in the andbox sandbox. Supports Python-to-JS adaptation, auto-await for async code,
    and tool call extraction from execution results. Builds tool prompts for the system message.
  files:
    - web/clawser-codex.js
    - web/clawser-codex.d.ts
  api:
    - Codex
    - extractCodeBlocks
    - stripCodeBlocks
    - adaptPythonisms
    - autoAwait
    - buildToolPrompt
  category: code-execution
  notes: Executes in andbox Worker sandbox with configurable capability profiles.
  since: "1.0.0"
  see_also:
    - Sandbox
    - Andbox CLI

