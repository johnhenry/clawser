title: Getting Started
slug: getting-started
description: Quick start guide — installation, first run, and basic usage.
order: 1
features:
  - name: Installation
    status: implemented
    description: >
      Clone the repository and install dependencies with npm. Requires Node.js >= 24.0.0.
      Run `npm install` to set up all devDependencies including andbox, browsermesh, and vitest.
    source_files:
      - package.json
    notes: Requires Node.js 24+ due to native ES module and Web Crypto API usage.

  - name: Development Server
    status: implemented
    description: >
      Start the HTTPS dev server with `npm start` (uses web/serve-https.mjs) or the
      HTTP fallback with `npm run start:http` (serves on port 8080 via npx serve).
    source_files:
      - web/serve-https.mjs
    api_surface:
      - "npm start — HTTPS server"
      - "npm run start:http — HTTP fallback on :8080"
    notes: HTTPS is recommended for Web Crypto API and Service Worker support.

  - name: First Run
    status: implemented
    description: >
      On first load, Clawser opens the vault creation flow, then the workspace setup
      flow. Configure an LLM provider (API key), choose a model, and optionally import
      an existing workspace. The agent is ready to use once a provider is connected.
    source_files:
      - web/clawser-app.js
      - web/clawser-state.js
    screenshot: home-screen.png
