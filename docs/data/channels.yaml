# Clawser Channels — All channel adapters, Channel Gateway, scope isolation, routing
# Source of truth for the channel subsystem

- name: ChannelManager
  status: implemented
  description: >
    Central channel orchestration class. Manages channel registration, connection lifecycle,
    message routing, and history. Normalizes all inbound messages to the InboundMessage
    format. Provides tools for agent interaction with channels. Approximately 1,814 LOC
    across the channel subsystem.
  files:
    - web/clawser-channels.js
    - web/clawser-channels.d.ts
  api:
    - ChannelManager
    - ChannelManager.addChannel
    - ChannelManager.removeChannel
    - ChannelManager.getChannel
    - ChannelManager.listChannels
    - ChannelManager.connect
    - ChannelManager.disconnect
    - ChannelManager.handleInbound
    - ChannelManager.send
    - ChannelManager.getHistory
    - ChannelManager.clearHistory
    - ChannelManager.formatForAgent
    - ChannelManager.buildPrompt
  category: core
  notes: >
    CHANNEL_TYPES constant defines: WEBHOOK, TELEGRAM, DISCORD, SLACK, MATRIX, EMAIL, IRC.
    Each channel has a ChannelConfig with name, enabled, allowedUsers, allowedChannels, and secret.
  since: "1.0.0"
  see_also:
    - Channel Gateway

- name: Channel Gateway
  status: implemented
  description: >
    Per-channel serialized message queue gateway. All channel plugins register with the
    gateway, which provides per-channel queuing, scope isolation (isolated, shared, grouped),
    and response routing back to the originating plugin. Prevents concurrent message
    processing conflicts.
  files:
    - web/clawser-gateway.js
  api:
    - ChannelGateway
  category: gateway
  since: "1.0.0"
  see_also:
    - ChannelManager

- name: Gateway Server
  status: implemented
  description: >
    Server-side channel gateway for hosting channel bridges as a service.
  files:
    - web/clawser-gateway-server.js
  api:
    - GatewayServer
  category: gateway
  since: "1.5.0"

- name: Message Normalization
  status: implemented
  description: >
    All inbound messages from any channel are normalized to the InboundMessage format
    with id, channel type, channelId, sender (id, name, username), content, attachments,
    replyTo, and timestamp. formatForChannel() converts outbound messages to channel-specific
    format.
  files:
    - web/clawser-channels.js
    - web/clawser-channels.d.ts
  api:
    - createInboundMessage
    - createChannelConfig
    - isMessageAllowed
    - formatForChannel
    - InboundMessage
    - InboundMessageSender
  category: normalization
  since: "1.0.0"

- name: Discord Channel
  status: implemented
  description: >
    Discord bot integration via WebSocket gateway. Supports text channels in
    guilds. Requires Discord bot token. Fully self-contained — no server
    needed, the browser tab connects directly to Discord's Gateway. Add via
    the Channels panel (type "discord") — this constructs a real DiscordPlugin
    and registers it with ChannelGateway, not just a config-only entry.
  files:
    - web/clawser-channel-discord.js
    - web/clawser-ui-channels.js
  api:
    - DiscordPlugin
  category: adapter
  notes: >
    Default gateway intents (33281 = GUILDS + GUILD_MESSAGES + MESSAGE_CONTENT)
    do NOT include DIRECT_MESSAGES, so DMs are not received out of the box.
    Pass a custom `intents` bitmask (opts.intents, with the DIRECT_MESSAGES
    bit added) to receive DMs.
  since: "1.0.0"
  see_also:
    - "[Setup walkthrough](../docs/channel-setup/discord.md)"

- name: Slack Channel
  status: implemented
  description: >
    Slack integration via Socket Mode (WebSocket, self-contained — same
    pattern as Discord's Gateway) when an appToken is configured, or the
    classic Events API webhook for deployments that run their own relay.
    Outbound sends via the Web API (chat.postMessage). Add via the Channels
    panel (type "slack") — this constructs a real SlackPlugin and registers
    it with ChannelGateway, not just a config-only entry.
  files:
    - web/clawser-channel-slack.js
    - web/clawser-ui-channels.js
  api:
    - SlackPlugin
  category: adapter
  notes: >
    Fully self-contained via Socket Mode — no server needed, the browser
    tab connects directly to Slack using an app-level token (xapp-...).
    The webhook path (handleEvent()) still works for anyone who'd rather
    run their own relay/server instead.
  since: "1.0.0"
  see_also:
    - "[Setup walkthrough](../docs/channel-setup/slack.md)"

- name: Telegram Channel
  status: implemented
  description: >
    Telegram bot integration via long-polling. Supports text messages only —
    `createInboundMessage()` hardcodes `attachments: []` and there is no
    image or inline-keyboard support (inbound or outbound). Fully
    self-contained — no server needed. Add via the Channels panel (type
    "telegram") — this constructs a real TelegramPlugin and registers it
    with ChannelGateway, not just a config-only entry.
  files:
    - web/clawser-channel-telegram.js
    - web/clawser-ui-channels.js
  api:
    - TelegramPlugin
  category: adapter
  notes: >
    Requires bot token from BotFather. Images/attachments and inline
    keyboards are not implemented; tracked as a gap, not a documentation
    omission.
  since: "1.0.0"
  see_also:
    - "[Setup walkthrough](../docs/channel-setup/telegram.md)"

- name: Email Channel
  status: implemented
  description: >
    IMAP polling (via a wsh-based fetch proxy) + SMTP/Gmail API send.
    Normalizes inbound messages via createInboundMessage(). Add via the
    Channels panel (type "email") — the form's flat username/password
    fields are combined into a credentials object at construction time
    (EmailPlugin's real constructor shape).
  files:
    - web/clawser-channel-email.js
    - web/clawser-ui-channels.js
  api:
    - EmailPlugin
  category: adapter
  notes: >
    Was fully built and tested (15 tests) but never actually instantiated
    anywhere in the app until it was wired into the Channels panel's
    start/stop flow.
  since: "2.0.0"

- name: IRC Channel
  status: implemented
  description: >
    IRC client integration with channel and private message support. Connects to
    IRC servers via WebSocket bridge. Add via the Channels panel (type "irc")
    — this constructs a real IrcPlugin and registers it with ChannelGateway,
    not just a config-only entry. Supports a single channel per configured
    connection (IrcPlugin.config.channel), not multiple.
  files:
    - web/clawser-channel-irc.js
    - web/clawser-ui-channels.js
  api:
    - IrcPlugin
  category: adapter
  notes: >
    Bring your own server: the `server` field must be a `wss://` URL for a
    WebSocket-to-IRC gateway, not a raw IRC address — browsers can't open
    plain TCP sockets. Point it at a public WS-IRC bridge (e.g. the kind
    IRC web clients use) or run your own.
  since: "1.0.0"

- name: Matrix Channel
  status: implemented
  description: >
    Matrix protocol integration for decentralized chat. Supports encrypted rooms
    via Olm. Connects to any Matrix homeserver. Add via the Channels panel
    (type "matrix") — the form's homeserverUrl field is mapped to
    MatrixPlugin's real constructor field (homeserver) at construction time.
  files:
    - web/clawser-channel-matrix.js
    - web/clawser-ui-channels.js
  api:
    - MatrixPlugin
  category: adapter
  notes: >
    Bring your own homeserver: works directly from the browser via the
    Matrix client-server API's long-poll /sync — no bridge needed, unlike
    IRC. Point homeserverUrl at any Matrix homeserver you have an account
    (and access token) on, self-hosted or matrix.org.
  since: "1.0.0"

- name: Relay Channel
  status: implemented
  description: >
    Virtual webhook server route + BroadcastChannel relay for bridging
    messages between Clawser instances or external systems. Add via the
    Channels panel (type "webhook") — this constructs a real ChannelRelay
    and registers it with ChannelGateway. The cross-tab BroadcastChannel
    relay half works standalone once registered; the virtual-server
    webhook-receiving half (handleWebhook()) still needs to be wired to
    the app's virtual server routing (clawser-server.js) separately.
  files:
    - web/clawser-channel-relay.js
    - web/clawser-ui-channels.js
  api:
    - ChannelRelay
  category: adapter
  since: "1.5.0"

- name: TabWatch Channel
  status: implemented
  description: >
    Browser tab monitoring channel. Watches for changes in specified browser tabs
    and routes events as inbound messages to the agent.
  files:
    - web/clawser-channel-tabwatch.js
  api:
    - TabWatcherPlugin
  category: adapter
  since: "1.5.0"

