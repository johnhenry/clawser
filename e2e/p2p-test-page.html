<!DOCTYPE html>
<html>
<head>
  <title>Clawser P2P Test</title>
</head>
<body>
  <h1 id="title">Clawser P2P Test Page</h1>
  <div id="status">disconnected</div>
  <div id="pod-id"></div>
  <div id="peers"></div>
  <div id="messages"></div>

  <script>
    const podId = new URLSearchParams(location.search).get('podId') || 'pod-' + Math.random().toString(36).slice(2, 10)
    const signalingUrl = new URLSearchParams(location.search).get('signalingUrl') || 'ws://127.0.0.1:8787'

    document.getElementById('pod-id').textContent = podId

    const state = {
      ws: null,
      registered: false,
      peers: [],
      messages: [],
    }

    function updateUI() {
      document.getElementById('status').textContent = state.registered ? 'registered' : 'disconnected'
      document.getElementById('peers').textContent = state.peers.join(', ') || 'none'
      document.getElementById('messages').textContent = JSON.stringify(state.messages)
    }

    function connect() {
      const ws = new WebSocket(signalingUrl)
      state.ws = ws

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'register', podId }))
      }

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data)

        if (msg.type === 'registered') {
          state.registered = true
          updateUI()
        }

        if (msg.type === 'peers') {
          state.peers = msg.peers
          updateUI()
        }

        if (msg.type === 'peer-joined') {
          if (!state.peers.includes(msg.podId)) {
            state.peers.push(msg.podId)
          }
          updateUI()
        }

        if (msg.type === 'peer-left') {
          state.peers = state.peers.filter(p => p !== msg.podId)
          updateUI()
        }

        // Handle forwarded signaling messages as "received messages"
        if (msg.type === 'signal' && msg.source) {
          state.messages.push({ from: msg.source, data: msg.data })
          updateUI()
        }
      }

      ws.onclose = () => {
        state.registered = false
        updateUI()
      }
    }

    // Expose for programmatic use
    window.clawserTest = {
      get state() { return state },
      sendSignal(targetPodId, data) {
        if (state.ws && state.ws.readyState === 1) {
          state.ws.send(JSON.stringify({
            type: 'signal',
            target: targetPodId,
            data
          }))
          return true
        }
        return false
      }
    }

    connect()
  </script>
</body>
</html>
